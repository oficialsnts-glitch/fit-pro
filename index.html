<!DOCTYPE html>
<html lang="pt-PT">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#ef4444">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>SDR - SHAPE DE RESPONSA</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
  import { 
    getAuth, onAuthStateChanged, GoogleAuthProvider, signInWithPopup, 
    signInWithEmailAndPassword, createUserWithEmailAndPassword, signOut 
  } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
  import { getFirestore, doc, setDoc, getDoc, collection, onSnapshot } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyB-OVW28besAOq2gi9b6Et9EqIajLS-uwY",
    authDomain: "fit-pro-985ac.firebaseapp.com",
    projectId: "fit-pro-985ac",
    storageBucket: "fit-pro-985ac.firebasestorage.app",
    messagingSenderId: "809428255492",
    appId: "1:809428255492:web:c59ee6687310b8a3004651"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getFirestore(app);
  const appId = "fit-pro-985ac";

  window.fb = { 
    auth, db, appId, doc, setDoc, getDoc, collection, onSnapshot,
    GoogleAuthProvider, signInWithPopup, signInWithEmailAndPassword, createUserWithEmailAndPassword, signOut 
  };

  onAuthStateChanged(auth, async (user) => {
      if (user) {
          window.currentUser = user;
          document.getElementById('auth-screen').classList.add('hidden');
          document.getElementById('main-app').classList.remove('hidden');
          await window.loadUserData(); 
      } else {
          window.currentUser = null;
          document.getElementById('auth-screen').classList.remove('hidden');
          document.getElementById('main-app').classList.add('hidden');
      }
  });
</script>

<style>
  body { -webkit-tap-highlight-color: transparent; overscroll-behavior: none; background-color: #111827; }
  .muscle { fill: #374151; transition: all 0.3s; }
  .muscle-active { fill: #ef4444; filter: drop-shadow(0 0 6px #ef4444); }
  .gif-img { object-fit: cover; width: 100%; height: 100%; }
  .timer-ring { transform: rotate(-90deg); transform-origin: 50% 50%; }
  @keyframes slideUp { from { transform: translateY(100%); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
  .slide-up { animation: slideUp 0.4s cubic-bezier(0.16, 1, 0.3, 1); }
  .btn-press:active { transform: scale(0.96); }
  .tab-btn.active { color: #ef4444; font-weight: 800; }
  .brand-gradient { background: linear-gradient(135deg, #ef4444 0%, #991b1b 100%); }
  ::-webkit-scrollbar { width: 0px; background: transparent; }
  .ai-badge { background: linear-gradient(90deg, #ef4444, #ec4899); }
</style>
</head>
<body class="bg-gray-900 text-white font-sans select-none overflow-x-hidden">

<div id="toast" class="hidden fixed top-6 left-1/2 -translate-x-1/2 bg-red-600 text-white px-6 py-3 rounded-2xl z-[20000] shadow-2xl slide-up text-sm font-bold uppercase"></div>

<div id="auth-screen" class="fixed inset-0 bg-gray-950 flex items-center justify-center p-6 z-[10000] overflow-y-auto">
    <div class="w-full max-w-sm text-center slide-up py-10">
        <div class="mb-10">
            <div class="w-20 h-20 brand-gradient rounded-[30px] mx-auto flex items-center justify-center text-4xl mb-4 shadow-2xl shadow-red-900/40 border border-red-500/30">💀</div>
            <h1 class="text-3xl font-black italic uppercase tracking-tighter leading-none text-white">SDR<br><span class="text-red-500">SHAPE DE RESPONSA</span></h1>
        </div>

        <div id="auth-forms" class="space-y-4">
            <button onclick="loginGoogle()" class="w-full bg-white text-black py-4 rounded-2xl font-bold flex items-center justify-center gap-3 btn-press shadow-lg mb-4">
                <svg class="w-5 h-5" viewBox="0 0 488 512"><path d="M488 261.8C488 403.3 391.1 504 248 504 110.8 504 0 393.2 0 256S110.8 8 248 8c66.8 0 123 24.5 166.3 64.9l-67.5 64.9C258.5 52.6 94.3 116.6 94.3 256c0 86.5 69.1 156.6 153.7 156.6 98.2 0 135-70.4 140.8-106.9H248v-85.3h236.1c2.3 12.7 3.9 24.9 3.9 41.4z"/></svg>
                Entrar com Google
            </button>
            <div class="flex items-center gap-4 py-2 opacity-30"><div class="h-[1px] bg-gray-600 flex-1"></div><span class="text-[9px] font-black uppercase">E-MAIL</span><div class="h-[1px] bg-gray-600 flex-1"></div></div>
            <div class="space-y-3 text-left">
                <input id="auth-email" type="email" placeholder="E-mail" class="w-full bg-gray-900 border border-gray-800 p-4 rounded-2xl text-sm outline-none focus:border-red-500">
                <input id="auth-pass" type="password" placeholder="Senha" class="w-full bg-gray-900 border border-gray-800 p-4 rounded-2xl text-sm outline-none focus:border-red-500">
                <button id="btn-main-action" onclick="handleEmailAuth()" class="w-full bg-red-600 py-4 rounded-2xl font-black uppercase tracking-widest text-sm btn-press shadow-lg mt-2">Entrar</button>
                <button onclick="toggleAuthMode()" id="btn-switch-auth" class="w-full mt-2 text-[10px] text-gray-500 font-bold uppercase tracking-widest text-center">Criar conta nova</button>
            </div>
        </div>
    </div>
</div>

<div id="main-app" class="hidden pb-24">
    <nav class="fixed bottom-0 w-full bg-gray-900/95 backdrop-blur border-t border-gray-800 flex justify-around z-50 py-2">
        <button onclick="showTab('home')" class="p-3 flex-1 text-center tab-btn active" id="btn-home">🏠</button>
        <button onclick="showTab('exercises')" class="p-3 flex-1 text-center tab-btn" id="btn-exercises">💪</button>
        <button onclick="showTab('workout')" class="p-3 flex-1 text-center tab-btn" id="btn-workout">🔥</button>
        <button onclick="showTab('progress')" class="p-3 flex-1 text-center tab-btn" id="btn-progress">📊</button>
        <button onclick="showTab('profile')" class="p-3 flex-1 text-center tab-btn" id="btn-profile">👤</button>
    </nav>

    <section id="home" class="tab-content p-6">
        <div class="flex justify-between items-center mb-6">
            <div>
                <h1 class="text-2xl font-black italic uppercase leading-none">Olá, <span id="userNameHome" class="text-red-500">Atleta</span></h1>
                <p id="biotipoHome" class="text-[10px] text-gray-500 font-bold uppercase mt-1">Carregando...</p>
            </div>
            <button onclick="logout()" class="p-2 bg-gray-800 rounded-xl">🚪</button>
        </div>

        <div class="bg-gray-800/80 border border-gray-700 p-6 rounded-[32px] mb-6 relative overflow-hidden">
            <div class="absolute top-0 right-0 ai-badge text-[8px] font-black px-3 py-1 rounded-bl-xl uppercase tracking-tighter">Personal AI Groq</div>
            <h3 class="text-xs font-black uppercase text-gray-400 mb-2">Plano Recomendado</h3>
            <div id="ai-recom-text" class="text-sm font-bold italic text-gray-100 leading-tight">Analizando seu perfil...</div>
            <button onclick="askAI()" class="mt-4 text-[10px] font-black uppercase text-red-500 border border-red-500/30 px-4 py-2 rounded-full">Atualizar Dicas</button>
        </div>

        <div class="grid grid-cols-3 gap-3 mb-6">
            <div class="bg-gray-800/50 p-4 rounded-3xl text-center"><div class="text-[9px] text-gray-500 uppercase">Peso</div><div id="currentWeight" class="text-lg font-black italic">-- kg</div></div>
            <div class="bg-gray-800/50 p-4 rounded-3xl text-center"><div class="text-[9px] text-gray-500 uppercase">Treinos</div><div id="workoutCount" class="text-lg font-black italic">0</div></div>
            <div class="bg-gray-800/50 p-4 rounded-3xl text-center"><div class="text-[9px] text-gray-500 uppercase">TMB</div><div id="tmbValue" class="text-lg font-black italic">--</div></div>
        </div>
    </section>

    <section id="profile" class="tab-content hidden p-6">
        <h1 class="text-2xl font-black italic uppercase mb-6">PERFIL <span class="text-red-500">SDR</span></h1>
        <div class="space-y-4 bg-gray-800/50 p-6 rounded-[40px]">
            <input id="name" placeholder="Nome" class="w-full bg-gray-950 p-4 rounded-2xl border border-gray-800 outline-none">
            <div class="grid grid-cols-2 gap-3">
                <input id="height" type="number" placeholder="Altura (cm)" class="w-full bg-gray-950 p-4 rounded-2xl border border-gray-800 outline-none">
                <input id="weight" type="number" placeholder="Peso (kg)" class="w-full bg-gray-950 p-4 rounded-2xl border border-gray-800 outline-none">
            </div>
            <select id="objective" class="w-full bg-gray-950 p-4 rounded-2xl border border-gray-800 outline-none">
                <option value="Hipertrofia">Ganhar Massa</option>
                <option value="Emagrecimento">Perder Gordura</option>
                <option value="Condicionamento">Condicionamento</option>
            </select>
            <button onclick="saveProfile()" class="w-full bg-red-600 py-5 rounded-[32px] font-black uppercase btn-press">Salvar e Atualizar AI</button>
        </div>
    </section>
    
    <section id="exercises" class="tab-content hidden p-6"><div id="exerciseList" class="space-y-2"></div></section>
    <section id="workout" class="tab-content hidden p-6"><div id="workoutSetup" class="text-center">Pronto para treinar?</div></section>
    <section id="progress" class="tab-content hidden p-6"><canvas id="weightChart"></canvas></section>
</div>

<script>
const GROQ_API_KEY = "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";
let DB = {
    user: { name: '', height: 170, weight: 75, age: 25, gender: 'M', objective: 'Hipertrofia' },
    aiTip: "Complete seu perfil para receber dicas da IA.",
    logs: [], progress: [], workoutCount: 0
};
let isRegisterMode = false;

// --- GROQ AI INTEGRATION ---
async function askAI() {
    const textTarget = document.getElementById('ai-recom-text');
    textTarget.innerText = "IA Pensando...";
    
    const prompt = `Usuário: ${DB.user.name}, Peso: ${DB.user.weight}kg, Altura: ${DB.user.height}cm, Objetivo: ${DB.user.objective}. 
    Com base nisso, dê uma recomendação de 2 frases curtas sobre qual tipo de treino ele deve focar hoje e uma dica de nutrição rápida. Seja motivador e use gírias de academia.`;

    try {
        const response = await fetch("https://api.groq.com/openai/v1/chat/completions", {
            method: "POST",
            headers: {
                "Authorization": `Bearer ${GROQ_API_KEY}`,
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                model: "llama3-8b-8192",
                messages: [{ role: "system", content: "Você é um personal trainer hardcore." }, { role: "user", content: prompt }]
            })
        });
        const data = await response.json();
        const advice = data.choices[0].message.content;
        DB.aiTip = advice;
        textTarget.innerText = advice;
        await saveToFirebase();
    } catch (e) {
        textTarget.innerText = "Bora treinar! Foco no objetivo.";
    }
}

// --- AUTH ---
async function loginGoogle() {
    const provider = new window.fb.GoogleAuthProvider();
    await window.fb.signInWithPopup(window.fb.auth, provider);
}

async function handleEmailAuth() {
    const email = document.getElementById('auth-email').value;
    const pass = document.getElementById('auth-pass').value;
    if(isRegisterMode) await window.fb.createUserWithEmailAndPassword(window.fb.auth, email, pass);
    else await window.fb.signInWithEmailAndPassword(window.fb.auth, email, pass);
}

function toggleAuthMode() {
    isRegisterMode = !isRegisterMode;
    document.getElementById('btn-main-action').innerText = isRegisterMode ? "CRIAR CONTA" : "ENTRAR";
}

async function logout() { await window.fb.signOut(window.fb.auth); }

// --- DATA ---
window.loadUserData = async function() {
    const { db, appId, doc, getDoc } = window.fb;
    const docRef = doc(db, 'artifacts', appId, 'users', window.currentUser.uid, 'appData', 'main');
    const snap = await getDoc(docRef);
    
    if(snap.exists()) {
        DB = snap.data();
        document.getElementById('ai-recom-text').innerText = DB.aiTip;
    } else {
        // Primeiro Login: Definir dados básicos e chamar IA
        DB.user.name = window.currentUser.displayName ? window.currentUser.displayName.split(' ')[0] : 'Atleta';
        await askAI(); 
    }
    updateUI();
};

async function saveToFirebase() {
    const { db, appId, doc, setDoc } = window.fb;
    await setDoc(doc(db, 'artifacts', appId, 'users', window.currentUser.uid, 'appData', 'main'), DB);
}

async function saveProfile() {
    DB.user.name = document.getElementById('name').value;
    DB.user.height = document.getElementById('height').value;
    DB.user.weight = document.getElementById('weight').value;
    DB.user.objective = document.getElementById('objective').value;
    await askAI(); // Atualiza a recomendação da IA quando o perfil muda
    showToast("PERFIL E IA ATUALIZADOS!");
}

function updateUI() {
    document.getElementById('userNameHome').innerText = DB.user.name;
    document.getElementById('biotipoHome').innerText = DB.user.objective;
    document.getElementById('currentWeight').innerText = DB.user.weight + ' kg';
    document.getElementById('workoutCount').innerText = DB.workoutCount;
    document.getElementById('name').value = DB.user.name;
    document.getElementById('height').value = DB.user.height;
    document.getElementById('weight').value = DB.user.weight;
    document.getElementById('objective').value = DB.user.objective;
}

function showTab(tab) {
    document.querySelectorAll('.tab-content').forEach(t => t.classList.add('hidden'));
    document.getElementById(tab).classList.remove('hidden');
}

function showToast(m) {
    const t = document.getElementById('toast');
    t.innerText = m; t.classList.remove('hidden');
    setTimeout(() => t.classList.add('hidden'), 3000);
}
</script>
</body>
</html>
