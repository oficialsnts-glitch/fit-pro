<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#0a0f1a">
    <title>FitPro Max Cloud AI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root { --bg: #070b14; --card: #121826; --accent: #ef4444; }
        body { background: var(--bg); color: #fff; font-family: 'Inter', sans-serif; -webkit-font-smoothing: antialiased; overflow-x: hidden; }
        .card { background: var(--card); border: 1px solid rgba(255,255,255,0.05); }
        .tab-content { display: none; }
        .tab-content.active { display: block; animation: fadeIn 0.4s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .nav-btn.active { color: var(--accent); }
        .focus-btn { background: #1a2233; border: 1px solid transparent; transition: 0.2s; cursor: pointer; }
        .focus-btn.active { border-color: var(--accent); background: rgba(239, 68, 68, 0.1); color: var(--accent); }
        input, select { background: #1a2233 !important; border: 1px solid rgba(255,255,255,0.05) !important; color: white !important; }
        .btn-gradient { background: linear-gradient(135deg, #ef4444, #991b1b); }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        /* Style for workout checkbox */
        .workout-checkbox:checked + span { text-decoration: line-through; color: #4b5563; }
    </style>
</head>
<body>

    <div id="toast" class="hidden fixed top-6 left-1/2 -translate-x-1/2 bg-red-600 text-white px-8 py-3 rounded-full z-[200] shadow-2xl font-bold text-xs uppercase text-center min-w-[250px]"></div>

    <div id="login-screen" class="fixed inset-0 z-[100] bg-[#070b14] flex flex-col items-center justify-center p-10">
        <div class="w-16 h-16 bg-red-600 rounded-2xl flex items-center justify-center mb-6 shadow-2xl rotate-3">
            <i class="fas fa-bolt text-3xl"></i>
        </div>
        <h1 id="auth-title" class="text-3xl font-black italic mb-1 uppercase tracking-tighter">Entrar</h1>
        <p class="text-gray-500 text-[10px] font-bold uppercase tracking-[0.2em] mb-10">FitPro Max AI</p>
        
        <div class="w-full max-w-xs space-y-4">
            <input type="hidden" id="auth-mode" value="login">
            <input id="auth-email" type="email" placeholder="Email" class="w-full p-4 rounded-2xl outline-none text-sm">
            <div class="relative">
                <input id="auth-pass" type="password" placeholder="Senha" class="w-full p-4 rounded-2xl outline-none text-sm pr-12">
                <button type="button" id="toggle-pass-btn" class="absolute right-4 top-1/2 -translate-y-1/2 text-gray-500">
                    <i id="toggle-pass-icon" class="fas fa-eye"></i>
                </button>
            </div>
            <button id="auth-btn" class="w-full btn-gradient py-4 rounded-2xl font-black text-xs uppercase shadow-xl active:scale-95 transition-transform">Acessar</button>
            <button id="auth-link-btn" class="w-full text-gray-600 text-[9px] font-bold uppercase tracking-widest pt-2">Criar nova conta</button>
        </div>
    </div>

    <div id="main-app" class="hidden min-h-screen flex flex-col max-w-md mx-auto relative">
        <main class="flex-1 pb-32 pt-8 px-6 overflow-y-auto">
            
            <section id="tab-home" class="tab-content active">
                <div class="flex justify-between items-center mb-8">
                    <div>
                        <p class="text-[10px] font-black text-red-500 uppercase tracking-widest mb-1">Status de Hoje</p>
                        <h2 class="text-3xl font-black italic uppercase leading-none"><span id="dash-name">Atleta</span></h2>
                    </div>
                </div>

                <div class="grid grid-cols-2 gap-4 mb-8">
                    <div class="card p-5 rounded-[2rem]">
                        <span class="text-[9px] font-black text-gray-500 uppercase tracking-widest mb-4 block">Peso Atual</span>
                        <p class="text-2xl font-black"><span id="dash-weight">--</span> <span class="text-[10px] text-gray-600 font-normal">KG</span></p>
                    </div>
                    <div class="card p-5 rounded-[2rem]">
                        <span class="text-[9px] font-black text-gray-500 uppercase tracking-widest mb-4 block">Sugestão Calórica</span>
                        <p class="text-2xl font-black"><span id="dash-kcal">--</span> <span class="text-[10px] text-gray-600 font-normal">KCAL</span></p>
                    </div>
                </div>

                <div class="mb-8">
                    <h4 class="text-[10px] font-black text-gray-600 uppercase tracking-widest mb-4">Foco do Dia (Para Geração)</h4>
                    <div class="flex gap-3 overflow-x-auto pb-2 no-scrollbar" id="focus-container">
                        <button class="focus-btn focus-item active px-6 py-3 rounded-2xl text-[10px] font-black uppercase whitespace-nowrap" data-focus="Peito">Peito</button>
                        <button class="focus-btn focus-item px-6 py-3 rounded-2xl text-[10px] font-black uppercase whitespace-nowrap" data-focus="Costas">Costas</button>
                        <button class="focus-btn focus-item px-6 py-3 rounded-2xl text-[10px] font-black uppercase whitespace-nowrap" data-focus="Pernas">Pernas</button>
                        <button class="focus-btn focus-item px-6 py-3 rounded-2xl text-[10px] font-black uppercase whitespace-nowrap" data-focus="Braços">Braços</button>
                    </div>
                </div>

                <div class="card p-6 rounded-[2.5rem]">
                    <h4 class="text-[10px] font-black text-gray-500 uppercase tracking-widest mb-4">Evolução de Peso</h4>
                    <canvas id="weight-chart" height="150"></canvas>
                </div>
            </section>

            <section id="tab-workout" class="tab-content">
                <div class="flex justify-between items-end mb-10">
                    <h2 class="text-4xl font-black italic uppercase leading-none">Plano<br><span class="text-red-500">Do Dia</span></h2>
                    <button id="btn-gen-workout" class="bg-white text-black w-14 h-14 rounded-2xl flex items-center justify-center shadow-xl active:scale-90 transition-transform">
                        <i class="fas fa-wand-magic-sparkles"></i>
                    </button>
                </div>
                
                <div id="active-workout-container" class="hidden mb-10">
                    <div class="card p-6 rounded-[2rem] border-2 border-red-500/30 bg-red-950/10">
                        <div class="flex justify-between items-center mb-5 pb-3 border-b border-white/5">
                            <h3 class="text-xl font-black italic uppercase text-white" id="active-workout-title">Rotina Ativa</h3>
                            <span class="text-[9px] font-bold text-gray-500 uppercase">Seguir Rotina</span>
                        </div>
                        <div class="space-y-4" id="active-workout-exercises">
                            </div>
                    </div>
                </div>

                <h4 class="text-[10px] font-black text-gray-600 uppercase tracking-widest mb-4">Histórico de Planos</h4>
                <div id="workout-list" class="space-y-4"></div>
            </section>

            <section id="tab-profile" class="tab-content">
                <h2 class="text-4xl font-black italic uppercase mb-10">Meu<br><span class="text-red-500">Perfil</span></h2>
                <div class="space-y-4">
                    <input id="p-name" type="text" placeholder="Seu Nome" class="w-full p-5 rounded-2xl outline-none text-sm font-bold">
                    <div class="grid grid-cols-2 gap-4">
                        <input id="p-weight" type="number" placeholder="Peso (kg)" class="w-full p-5 rounded-2xl outline-none text-sm font-bold">
                        <input id="p-height" type="number" placeholder="Altura (cm)" class="w-full p-5 rounded-2xl outline-none text-sm font-bold">
                    </div>
                    <select id="p-goal" class="w-full p-5 rounded-2xl outline-none text-sm font-bold appearance-none">
                        <option value="gain">Ganho de Massa</option>
                        <option value="lose">Definição Muscular</option>
                        <option value="maintain">Manutenção</option>
                    </select>
                    <button id="btn-save-profile" class="w-full btn-gradient py-5 rounded-2xl font-black text-xs uppercase shadow-2xl active:scale-95 transition-transform">Atualizar Perfil</button>
                    
                    <div class="pt-10 border-t border-white/5">
                        <h4 class="text-[10px] font-black text-gray-600 uppercase mb-4">Registrar Peso de Hoje</h4>
                        <div class="flex gap-3">
                            <input id="new-weight-val" type="number" step="0.1" placeholder="00.0" class="flex-1 p-5 rounded-2xl outline-none text-sm font-bold">
                            <button id="btn-add-weight" class="bg-white text-black w-16 rounded-2xl flex items-center justify-center font-black"><i class="fas fa-check"></i></button>
                        </div>
                    </div>
                    <button id="btn-logout" class="w-full py-6 text-gray-700 text-[9px] font-black uppercase tracking-[0.3em]">Encerrar Sessão</button>
                </div>
            </section>
        </main>

        <nav class="fixed bottom-0 w-full max-w-md bg-gray-950/80 backdrop-blur-2xl border-t border-white/5 flex justify-around py-8 px-4 z-50 rounded-t-[3rem]">
            <button id="nav-home" class="nav-btn active flex flex-col items-center flex-1">
                <i class="fas fa-home-alt text-lg mb-1"></i>
                <span class="text-[8px] font-black uppercase tracking-widest">Dash</span>
            </button>
            <button id="nav-workout" class="nav-btn flex flex-col items-center flex-1">
                <i class="fas fa-dumbbell text-lg mb-1"></i>
                <span class="text-[8px] font-black uppercase tracking-widest">Treino</span>
            </button>
            <button id="nav-profile" class="nav-btn flex flex-col items-center flex-1">
                <i class="fas fa-user text-lg mb-1"></i>
                <span class="text-[8px] font-black uppercase tracking-widest">Conta</span>
            </button>
        </nav>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, collection, onSnapshot, addDoc, query, orderBy, limit } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-firestore.js";

        // CONFIGURAÇÕES FIREBASE (SEUS DADOS)
        const firebaseConfig = {
            apiKey: "AIzaSyB-OVW28besAOq2gi9b6Et9EqIajLS-uwY",
            authDomain: "fit-pro-985ac.firebaseapp.com",
            projectId: "fit-pro-985ac",
            storageBucket: "fit-pro-985ac.firebasestorage.app",
            messagingSenderId: "809428255492",
            appId: "1:809428255492:web:c59ee6687310b8a3004651"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        // CONFIGURAÇÃO GROQ (SUA CHAVE)
        const GROQ_API_KEY = "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"; 

        let currentUser = null;
        let userData = { profile: {}, weights: [], workouts: [] };
        let weightChart = null;

        // UI HELPERS
        const showToast = (msg, type = 'error') => {
            const t = document.getElementById('toast');
            t.innerText = msg;
            t.className = `fixed top-6 left-1/2 -translate-x-1/2 px-8 py-3 rounded-full z-[200] shadow-2xl font-bold text-xs uppercase text-center min-w-[250px] ${type === 'success' ? 'bg-green-600' : 'bg-red-600'} text-white`;
            t.classList.remove('hidden');
            setTimeout(() => t.classList.add('hidden'), 3000);
        };

        const changeTab = (id) => {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.getElementById('tab-' + id).classList.add('active');
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('nav-' + id).classList.add('active');
        };

        // EVENT LISTENERS NAVEGAÇÃO
        document.getElementById('nav-home').onclick = () => changeTab('home');
        document.getElementById('nav-workout').onclick = () => changeTab('workout');
        document.getElementById('nav-profile').onclick = () => changeTab('profile');

        // AUTH LOGIC
        document.getElementById('auth-btn').onclick = async () => {
            const email = document.getElementById('auth-email').value;
            const pass = document.getElementById('auth-pass').value;
            const mode = document.getElementById('auth-mode').value;
            if(!email || !pass) return showToast("Preencha todos os campos");

            try {
                if (mode === 'register') await createUserWithEmailAndPassword(auth, email, pass);
                else await signInWithEmailAndPassword(auth, email, pass);
            } catch (err) { showToast(err.message); }
        };

        document.getElementById('auth-link-btn').onclick = () => {
            const mode = document.getElementById('auth-mode');
            const isLogin = mode.value === 'login';
            mode.value = isLogin ? 'register' : 'login';
            document.getElementById('auth-title').innerText = isLogin ? "Criar Conta" : "Entrar";
            document.getElementById('auth-btn').innerText = isLogin ? "Registrar Agora" : "Acessar";
            document.getElementById('auth-link-btn').innerText = isLogin ? "Já tem conta? Entre" : "Criar nova conta";
        };

        document.getElementById('toggle-pass-btn').onclick = () => {
            const input = document.getElementById('auth-pass');
            const icon = document.getElementById('toggle-pass-icon');
            const isPass = input.type === 'password';
            input.type = isPass ? 'text' : 'password';
            icon.className = isPass ? 'fas fa-eye-slash' : 'fas fa-eye';
        };

        // DATABASE SYNC
        onAuthStateChanged(auth, (user) => {
            currentUser = user;
            if (user) {
                document.getElementById('login-screen').classList.add('hidden');
                document.getElementById('main-app').classList.remove('hidden');
                startApp(user.uid);
            } else {
                document.getElementById('login-screen').classList.remove('hidden');
                document.getElementById('main-app').classList.add('hidden');
            }
        });

        function startApp(uid) {
            // Perfil
            onSnapshot(doc(db, 'users', uid, 'settings', 'profile'), (s) => {
                if (s.exists()) {
                    userData.profile = s.data();
                    updateUI();
                }
            });

            // Pesos
            const qWeights = query(collection(db, 'users', uid, 'weights'), orderBy('date', 'asc'));
            onSnapshot(qWeights, (s) => {
                userData.weights = s.docs.map(d => d.data());
                renderChart();
            });

            // Treinos - Listen for history, but also fetch the latest for active view
            const qWorkouts = query(collection(db, 'users', uid, 'workouts'), orderBy('date', 'desc'), limit(10));
            onSnapshot(qWorkouts, (s) => {
                userData.workouts = s.docs.map(d => d.data());
                renderWorkoutHistory();
                // If there's at least one workout, offer to use the latest as active on load
                if (userData.workouts.length > 0) {
                    renderActiveWorkout(userData.workouts[0]);
                }
            });
        }

        function updateUI() {
            const p = userData.profile;
            document.getElementById('dash-name').innerText = p.name || "Atleta";
            document.getElementById('dash-weight').innerText = p.weight || "--";
            
            const factor = p.goal === 'gain' ? 35 : (p.goal === 'lose' ? 24 : 30);
            document.getElementById('dash-kcal').innerText = Math.round((p.weight || 70) * factor) || '--';
            
            document.getElementById('p-name').value = p.name || "";
            document.getElementById('p-weight').value = p.weight || "";
            document.getElementById('p-height').value = p.height || "";
            document.getElementById('p-goal').value = p.goal || "gain";
        }

        function renderChart() {
            const ctx = document.getElementById('weight-chart');
            if(!ctx || userData.weights.length < 2) return;
            const last7 = userData.weights.slice(-7);
            
            if(weightChart) weightChart.destroy();
            weightChart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: last7.map(w => new Date(w.date).toLocaleDateString('pt-BR', {day:'2-digit', month:'2-digit'})),
                    datasets: [{
                        data: last7.map(w => w.weight),
                        borderColor: '#ef4444',
                        backgroundColor: 'rgba(239, 68, 68, 0.1)',
                        fill: true,
                        tension: 0.4,
                        borderWidth: 3,
                        pointRadius: 4
                    }]
                },
                options: { plugins: { legend: { display: false } }, scales: { y: { display: false }, x: { grid: { display: false }, ticks: { color: '#555', font: { size: 10 } } } } }
            });
        }

        // --- NEW: Render workout as an active routine to follow ---
        function renderActiveWorkout(workout) {
            const container = document.getElementById('active-workout-container');
            const titleEl = document.getElementById('active-workout-title');
            const exercisesEl = document.getElementById('active-workout-exercises');

            titleEl.innerText = workout.title;
            exercisesEl.innerHTML = workout.exercises.map((ex, index) => `
                <label class="flex items-center gap-4 p-4 rounded-xl bg-[#1a2233] border border-white/5 cursor-pointer active:scale-[0.98] transition-transform">
                    <input type="checkbox" class="workout-checkbox w-5 h-5 rounded border-gray-700 bg-gray-800 text-red-600 focus:ring-red-600 focus:ring-offset-gray-900" id="ex-${index}">
                    <span class="flex-1 text-sm text-gray-200 font-medium">${ex}</span>
                    <i class="fas fa-chevron-right text-gray-700 text-xs"></i>
                </label>
            `).join('');

            container.classList.remove('hidden');
        }

        function renderWorkoutHistory() {
            const list = document.getElementById('workout-list');
            if(userData.workouts.length === 0) {
                list.innerHTML = '<p class="text-center py-10 opacity-20 font-black uppercase text-xs">Nenhum plano gerado</p>';
                return;
            }
            // History list, omitting the very latest if it's already shown as active
            list.innerHTML = userData.workouts.map(w => `
                <div class="card p-6 rounded-[2rem] border border-white/5 opacity-70">
                    <div class="flex justify-between items-start mb-3">
                        <h3 class="text-md font-black italic uppercase text-gray-400">${w.title}</h3>
                        <span class="text-[8px] text-gray-700">${new Date(w.date).toLocaleDateString()}</span>
                    </div>
                    <div class="space-y-1 text-[11px] text-gray-600">
                        ${w.exercises.slice(0, 3).join(', ')}${w.exercises.length > 3 ? '...' : ''}
                    </div>
                </div>
            `).join('');
        }

        // SALVAR DADOS
        document.getElementById('btn-save-profile').onclick = async () => {
            const profile = {
                name: document.getElementById('p-name').value,
                weight: parseFloat(document.getElementById('p-weight').value) || 0,
                height: parseFloat(document.getElementById('p-height').value) || 0,
                goal: document.getElementById('p-goal').value
            };
            await setDoc(doc(db, 'users', currentUser.uid, 'settings', 'profile'), profile);
            showToast("Perfil Atualizado!", 'success');
        };

        document.getElementById('btn-add-weight').onclick = async () => {
            const val = parseFloat(document.getElementById('new-weight-val').value);
            if(!val) return;
            await addDoc(collection(db, 'users', currentUser.uid, 'weights'), {
                weight: val,
                date: new Date().toISOString()
            });
            document.getElementById('new-weight-val').value = '';
            showToast("Peso registrado!", 'success');
        };

        document.getElementById('btn-logout').onclick = () => signOut(auth);

        // SELETOR DE FOCO
        document.querySelectorAll('.focus-item').forEach(btn => {
            btn.onclick = () => {
                document.querySelectorAll('.focus-item').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
            };
        });

        // GERADOR AI - INTEGRADO COM GROQ E ROTINA ATIVA
        document.getElementById('btn-gen-workout').onclick = async () => {
            const btn = document.getElementById('btn-gen-workout');
            const focus = document.querySelector('.focus-item.active').dataset.focus;
            btn.disabled = true;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i>';

            const prompt = `Atue como um Personal Trainer Expert. Crie um treino focado em ${focus} para uma pessoa que deseja ${userData.profile.goal || 'condicionamento geral'}.
            Retorne APENAS um objeto JSON puro, sem markdown, seguindo este modelo exato:
            {"title": "Nome do Treino", "exercises": ["Exercício - Séries/Reps", "Exercício - Séries/Reps"]}`;

            try {
                const response = await fetch(`https://api.groq.com/openai/v1/chat/completions`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${GROQ_API_KEY}`
                    },
                    body: JSON.stringify({
                        model: "llama-3.1-8b-instant",
                        messages: [{ role: "user", content: prompt }],
                        temperature: 0.6,
                        response_format: { type: "json_object" }
                    })
                });

                if (!response.ok) throw new Error('Falha na resposta da IA');

                const data = await response.json();
                const workout = JSON.parse(data.choices[0].message.content);

                const workoutData = {
                    ...workout,
                    date: new Date().toISOString()
                };

                // 1. Salvar no Firestore
                await addDoc(collection(db, 'users', currentUser.uid, 'workouts'), workoutData);
                
                // 2. NEW: Render immediately as the active routine to follow
                renderActiveWorkout(workoutData);

                showToast("Groq AI gerou sua rotina! Siga o plano.", 'success');
                
            } catch (err) {
                console.error(err);
                showToast("Erro na IA: Verifique sua chave ou conexão.");
            } finally {
                btn.disabled = false;
                btn.innerHTML = '<i class="fas fa-wand-magic-sparkles"></i>';
            }
        };
    </script>
</body>
</html>
