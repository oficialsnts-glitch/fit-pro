<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ThodyFit</title>
<script src="https://cdn.tailwindcss.com"></script>

<style>
body { background:#0f172a; color:white; font-family:sans-serif; }
.card { background:#1e293b; padding:12px; border-radius:12px; }
.nav { position:fixed; bottom:0; left:0; right:0; background:#020617; display:flex; justify-content:space-around; padding:10px; }
button { background:#ef4444; padding:6px 10px; border-radius:8px; }
</style>
</head>

<body class="p-4 pb-24">

<h1 class="text-2xl font-bold mb-4">THODYFIT</h1>

<div id="app"></div>

<div class="nav">
<button onclick="showTab('treino')">Treino</button>
<button onclick="showTab('progresso')">Progresso</button>
<button onclick="showTab('perfil')">Perfil</button>
</div>

<script>
const BASE = "./";

let EXERCISES = [];
let DB = JSON.parse(localStorage.getItem("db")) || {
  user: {},
  logs: []
};

// ================= LOAD =================
async function load() {
  const res = await fetch("exercises.json");
  EXERCISES = await res.json();
  showTab("treino");
}

// ================= HELPERS =================
function tryPaths(baseName) {
  return [
    baseName,
    baseName.replace(/_/g, ""),
    baseName.replace(/_/g, "-")
  ];
}

function getImage(name) {
  const base = "assets/images/";
  const variants = tryPaths(name);
  return base + variants[0] + ".jpg";
}

function getVideo(name) {
  const base = "assets/raw/";
  const variants = tryPaths(name);
  return base + variants[0] + ".mp4";
}

// ================= TABS =================
function showTab(tab) {
  const app = document.getElementById("app");

  if (tab === "treino") {
    app.innerHTML = "";

    EXERCISES.forEach(ex => {
      const div = document.createElement("div");
      div.className = "card mb-3";

      div.innerHTML = `
        <h3 class="font-bold">${ex.name}</h3>
        <img src="${getImage(ex.image_name)}" class="w-full h-40 object-cover rounded mt-2"
          onerror="this.src=''">

        <video controls class="w-full mt-2 rounded">
          <source src="${getVideo(ex.video_name)}" type="video/mp4">
        </video>

        <button onclick="log('${ex.name}')">Treinei</button>
      `;

      app.appendChild(div);
    });
  }

  if (tab === "progresso") {
    app.innerHTML = "<h2 class='text-xl mb-2'>Histórico</h2>";

    DB.logs.forEach(l => {
      app.innerHTML += `<div class="card mb-2">${l}</div>`;
    });
  }

  if (tab === "perfil") {
    app.innerHTML = `
      <h2 class="text-xl mb-2">Perfil</h2>

      <input id="name" placeholder="Seu nome" class="p-2 text-black w-full mb-2">
      <button onclick="saveProfile()">Salvar</button>

      <div class="mt-2">Nome: ${DB.user.name || "-"}</div>
    `;
  }
}

// ================= AÇÕES =================
function log(name) {
  DB.logs.push(name + " - " + new Date().toLocaleString());
  save();
  alert("Salvo!");
}

function saveProfile() {
  DB.user.name = document.getElementById("name").value;
  save();
  alert("Perfil salvo");
}

function save() {
  localStorage.setItem("db", JSON.stringify(DB));
}

// ================= INIT =================
load();
</script>

</body>
</html>
