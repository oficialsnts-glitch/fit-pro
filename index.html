<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#070b14">
    <title>FitPro Max AI | Elite v4</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">

    <style>
        :root { --bg: #070b14; --card: #131927; --accent: #ff3838; }
        body { background: var(--bg); color: #fff; font-family: 'Plus Jakarta Sans', sans-serif; -webkit-font-smoothing: antialiased; overscroll-behavior: none; }
        .premium-card { background: linear-gradient(145deg, #1a2233 0%, #131927 100%); border: 1px solid rgba(255,255,255,0.06); }
        .tab-content { display: none; }
        .tab-content.active { display: block; animation: slideUp 0.4s cubic-bezier(0.4, 0, 0.2, 1); }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .nav-btn.active { color: var(--accent); transform: scale(1.1); }
        .btn-premium { background: linear-gradient(90deg, #ff3838 0%, #ff6b6b 100%); transition: 0.3s; }
        .btn-premium:active { transform: scale(0.95); opacity: 0.9; }
        .glass { backdrop-filter: blur(12px); background: rgba(19, 25, 39, 0.85); }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .gif-container { width: 100%; height: 200px; border-radius: 1.5rem; overflow: hidden; background: #0a0f1a; }
        .gif-container img { width: 100%; height: 100%; object-fit: cover; }
    </style>
</head>
<body>

    <div id="toast" class="hidden fixed top-8 left-1/2 -translate-x-1/2 glass text-white px-8 py-4 rounded-3xl z-[600] shadow-2xl font-bold text-xs uppercase text-center border border-white/10"></div>

    <div id="login-screen" class="fixed inset-0 z-[400] bg-[#070b14] flex flex-col items-center justify-center p-12">
        <div class="relative mb-12">
            <div class="absolute inset-0 bg-red-600 blur-2xl opacity-20"></div>
            <div class="w-20 h-20 bg-red-600 rounded-3xl flex items-center justify-center relative shadow-2xl rotate-6">
                <i class="fas fa-bolt-lightning text-4xl text-white"></i>
            </div>
        </div>
        <h1 class="text-4xl font-extrabold italic mb-2 tracking-tighter">FITPRO <span class="text-red-500">MAX</span></h1>
        <div class="w-full max-w-sm space-y-4">
            <input id="auth-email" type="email" placeholder="Email" class="w-full p-5 rounded-2xl outline-none text-sm bg-[#1a2233] border border-white/5 focus:border-red-500/50">
            <input id="auth-pass" type="password" placeholder="Senha" class="w-full p-5 rounded-2xl outline-none text-sm bg-[#1a2233] border border-white/5 focus:border-red-500/50">
            <button id="auth-btn" class="w-full btn-premium py-5 rounded-2xl font-extrabold text-[11px] uppercase tracking-widest">Acessar</button>
            <button id="google-btn" class="w-full bg-white text-black py-5 rounded-2xl font-bold text-[11px] uppercase flex items-center justify-center gap-3 active:scale-95 transition-transform">
                <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" class="w-4 h-4">
                Entrar com Google
            </button>
        </div>
    </div>

    <div id="onboarding-overlay" class="hidden fixed inset-0 z-[450] bg-[#070b14] flex items-center justify-center p-8">
        <div class="premium-card w-full max-w-sm p-10 rounded-[3rem]">
            <h2 class="text-3xl font-black italic uppercase mb-2 text-red-500">Perfil</h2>
            <div class="space-y-4">
                <input id="on-name" type="text" placeholder="Nome" class="w-full p-5 rounded-2xl bg-[#0a0f1a] border border-white/5 text-sm font-bold">
                <select id="on-level" class="w-full p-5 rounded-2xl bg-[#0a0f1a] border border-white/5 text-sm font-bold">
                    <option value="beginner">Iniciante</option>
                    <option value="intermediate">Intermediário</option>
                    <option value="pro">Avançado</option>
                </select>
                <input id="on-weight" type="number" placeholder="Peso atual (kg)" class="w-full p-5 rounded-2xl bg-[#0a0f1a] border border-white/5 text-sm font-bold">
                <button id="btn-finish-onboarding" class="w-full btn-premium py-5 rounded-2xl font-black text-xs uppercase">Começar Jornada</button>
            </div>
        </div>
    </div>

    <div id="main-app" class="hidden min-h-screen flex flex-col max-w-lg mx-auto">
        <header class="pt-12 px-8 flex justify-between items-center mb-6">
            <div>
                <p class="text-[9px] font-black text-red-500 uppercase mb-1" id="user-level-badge">Elite</p>
                <h2 class="text-3xl font-black italic uppercase">Olá, <span id="dash-name">Atleta</span></h2>
            </div>
            <div class="flex items-center gap-3 glass p-3 rounded-2xl border border-white/10">
                <i class="fas fa-fire text-orange-500"></i>
                <span class="text-sm font-black" id="dash-streak">0</span>
            </div>
        </header>

        <main class="flex-1 pb-36 px-8 overflow-y-auto no-scrollbar">
            <section id="tab-home" class="tab-content active">
                <div class="grid grid-cols-2 gap-4 mb-8">
                    <div class="premium-card p-6 rounded-[2.5rem]">
                        <p class="text-[9px] font-bold text-gray-500 uppercase mb-1">Massa</p>
                        <p class="text-2xl font-black italic"><span id="dash-weight">--</span><span class="text-xs text-gray-600">kg</span></p>
                    </div>
                    <div class="premium-card p-6 rounded-[2.5rem]">
                        <p class="text-[9px] font-bold text-gray-500 uppercase mb-1">Treinos</p>
                        <p class="text-2xl font-black italic text-green-500" id="dash-total-workouts">0</p>
                    </div>
                </div>
                <div class="premium-card p-8 rounded-[3rem] mb-8">
                    <canvas id="weightChart" height="120"></canvas>
                </div>
            </section>

            <section id="tab-workout" class="tab-content">
                <div id="workout-selection">
                    <h2 class="text-3xl font-black italic uppercase mb-6">Seu Treino</h2>
                    <div id="ready-plans" class="flex gap-3 overflow-x-auto no-scrollbar mb-8"></div>
                </div>
                
                <div id="active-workout-container" class="hidden">
                    <div class="flex justify-between items-center mb-6">
                        <h3 class="text-xl font-black italic uppercase text-red-500" id="active-workout-title">Em curso...</h3>
                        <span id="timer" class="text-xs font-mono font-bold bg-white/5 px-3 py-1 rounded-lg">00:00</span>
                    </div>
                    <div id="active-workout-exercises" class="space-y-6"></div>
                    <button id="btn-finish-workout" class="w-full btn-premium py-5 rounded-3xl font-black text-xs uppercase mt-8 shadow-2xl">Finalizar Treino</button>
                </div>
            </section>

            <section id="tab-profile" class="tab-content">
                <h2 class="text-3xl font-black italic uppercase mb-8">Conta</h2>
                <div class="premium-card p-8 rounded-[2.5rem] space-y-6">
                    <button id="btn-logout" class="w-full py-4 text-red-500 text-[10px] font-black uppercase bg-red-500/5 rounded-2xl">Encerrar Sessão</button>
                </div>
            </section>
        </main>

        <nav class="fixed bottom-8 left-8 right-8 glass rounded-[2.5rem] border border-white/10 flex justify-around py-5 px-4 z-[300] shadow-2xl">
            <button id="nav-home" class="nav-btn active flex flex-col items-center flex-1"><i class="fas fa-grid-2 text-xl mb-1"></i><span class="text-[8px] font-bold uppercase">Home</span></button>
            <button id="nav-workout" class="nav-btn flex flex-col items-center flex-1"><i class="fas fa-dumbbell text-xl mb-1"></i><span class="text-[8px] font-bold uppercase">Treinar</span></button>
            <button id="nav-profile" class="nav-btn flex flex-col items-center flex-1"><i class="fas fa-user-circle text-xl mb-1"></i><span class="text-[8px] font-bold uppercase">Perfil</span></button>
        </nav>
    </div>

    <div id="exercise-modal" class="hidden fixed inset-0 z-[500] glass flex items-end justify-center">
        <div class="bg-[#0a0f1a] w-full max-w-lg rounded-t-[3.5rem] p-10 border-t border-white/10 animate-slideUp max-h-[90vh] overflow-y-auto no-scrollbar">
            <div class="w-16 h-1.5 bg-gray-800 rounded-full mx-auto mb-10"></div>
            
            <h3 id="modalTitle" class="text-3xl font-black italic uppercase text-red-500 mb-2">Exercício</h3>
            <div id="ex-modal-tags" class="flex gap-2 mb-6"></div>

            <div class="gif-container mb-6 shadow-2xl">
                <img id="modalGif" src="" alt="Execução">
            </div>

            <div class="space-y-6">
                <div class="premium-card p-6 rounded-3xl">
                    <h4 class="text-[10px] font-black text-red-500 uppercase mb-2 tracking-widest">Como Executar</h4>
                    <p id="modalExecution" class="text-sm text-gray-300 leading-relaxed font-medium"></p>
                </div>

                <div class="bg-orange-500/10 border border-orange-500/20 p-6 rounded-3xl">
                    <h4 class="text-[10px] font-black text-orange-500 uppercase mb-2 tracking-widest">⚠️ Erro Comum</h4>
                    <p id="modalError" class="text-sm text-gray-300 font-medium"></p>
                </div>
            </div>

            <button onclick="document.getElementById('exercise-modal').classList.add('hidden')" class="w-full py-5 btn-premium rounded-2xl font-black text-xs uppercase mt-8">Voltar ao Treino</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged, signOut, GoogleAuthProvider, signInWithPopup } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc, collection, onSnapshot, addDoc, query, orderBy, limit } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyB-OVW28besAOq2gi9b6Et9EqIajLS-uwY",
            authDomain: "fit-pro-985ac.firebaseapp.com",
            projectId: "fit-pro-985ac",
            storageBucket: "fit-pro-985ac.firebasestorage.app",
            messagingSenderId: "809428255492",
            appId: "1:809428255492:web:c59ee6687310b8a3004651"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const provider = new GoogleAuthProvider();

        let currentUser = null;
        let userData = { profile: null, workouts: [] };
        let workoutTimer = null;
        let seconds = 0;

        // BIBLIOTECA DE EXERCÍCIOS (REFERÊNCIA)
        const EXERCISES_DB = [
            {id:1, name:'Supino Reto Barra', muscles:['Peito','Tríceps'], gif:'https://fitnessprogramer.com/wp-content/uploads/2021/02/Barbell-Bench-Press.gif', execution:'Deite no banco, pegada na largura dos ombros. Desça a barra até o peito e empurre com explosão.', error:'Retirar a lombar do banco durante a carga.'},
            {id:2, name:'Agachamento Livre', muscles:['Pernas','Glúteo'], gif:'https://fitnessprogramer.com/wp-content/uploads/2021/02/Barbell-Squat.gif', execution:'Barra nos trapézios. Desça controladamente como se fosse sentar.', error:'Joelho colapsar para dentro ou passar excessivamente da ponta do pé.'},
            {id:3, name:'Puxada Frontal', muscles:['Costas','Bíceps'], gif:'https://fitnessprogramer.com/wp-content/uploads/2021/02/Wide-Grip-Lat-Pulldown.gif', execution:'Puxe a barra em direção ao peito superior, mantendo o tronco levemente inclinado.', error:'Usar o balanço do corpo para puxar o peso.'},
            {id:4, name:'Rosca Direta', muscles:['Bíceps'], gif:'https://fitnessprogramer.com/wp-content/uploads/2021/02/Barbell-Curl.gif', execution:'Mantenha os cotovelos fixos ao lado do corpo e flexione os braços.', error:'Balançar os ombros para ajudar na subida.'}
        ];

        const showToast = (msg) => {
            const t = document.getElementById('toast');
            t.innerText = msg; t.classList.remove('hidden');
            setTimeout(() => t.classList.add('hidden'), 3000);
        };

        // AUTH & SYNC
        document.getElementById('google-btn').onclick = () => signInWithPopup(auth, provider);
        document.getElementById('auth-btn').onclick = () => {
            const email = document.getElementById('auth-email').value;
            const pass = document.getElementById('auth-pass').value;
            signInWithEmailAndPassword(auth, email, pass).catch(() => createUserWithEmailAndPassword(auth, email, pass));
        };

        onAuthStateChanged(auth, async (user) => {
            currentUser = user;
            if(user) {
                document.getElementById('login-screen').classList.add('hidden');
                document.getElementById('main-app').classList.remove('hidden');
                const pSnap = await getDoc(doc(db, 'users', user.uid, 'settings', 'profile'));
                if(!pSnap.exists()) document.getElementById('onboarding-overlay').classList.remove('hidden');
                else startSync(user.uid);
            } else {
                document.getElementById('login-screen').classList.remove('hidden');
                document.getElementById('main-app').classList.add('hidden');
            }
        });

        document.getElementById('btn-finish-onboarding').onclick = async () => {
            const p = { name: document.getElementById('on-name').value, level: document.getElementById('on-level').value, weight: document.getElementById('on-weight').value };
            await setDoc(doc(db, 'users', currentUser.uid, 'settings', 'profile'), p);
            location.reload();
        };

        function startSync(uid) {
            onSnapshot(doc(db, 'users', uid, 'settings', 'profile'), s => {
                const data = s.data();
                document.getElementById('dash-name').innerText = data.name;
                document.getElementById('dash-weight').innerText = data.weight;
                document.getElementById('user-level-badge').innerText = data.level;
                renderReadyPlans(data.level);
            });
            onSnapshot(collection(db, 'users', uid, 'workouts'), s => {
                document.getElementById('dash-total-workouts').innerText = s.size;
                document.getElementById('dash-streak').innerText = s.size;
            });
        }

        // TREINOS
        function renderReadyPlans(level) {
            const plans = [{title: "Treino A - Push", ids:[1,4]}, {title: "Treino B - Pull", ids:[3,4]}];
            document.getElementById('ready-plans').innerHTML = plans.map(p => `
                <button onclick="window.loadWorkout('${p.title}', [${p.ids}])" class="glass px-6 py-4 rounded-3xl text-[10px] font-black uppercase border border-white/5">
                    <i class="fas fa-play text-red-500 mr-2"></i> ${p.title}
                </button>
            `).join('');
        }

        window.loadWorkout = (title, ids) => {
            const exercises = ids.map(id => EXERCISES_DB.find(ex => ex.id === id));
            document.getElementById('workout-selection').classList.add('hidden');
            document.getElementById('active-workout-container').classList.remove('hidden');
            document.getElementById('active-workout-title').innerText = title;
            
            document.getElementById('active-workout-exercises').innerHTML = exercises.map((ex, i) => `
                <div class="premium-card p-6 rounded-[2.5rem]">
                    <div class="flex justify-between items-center mb-4">
                        <span class="text-sm font-black italic uppercase">${ex.name}</span>
                        <button onclick="window.openDetail(${ex.id})" class="text-blue-500 text-[10px] font-bold">VER TÉCNICA</button>
                    </div>
                    <div class="grid grid-cols-2 gap-2">
                        <input type="number" placeholder="Kg" class="bg-black/20 p-4 rounded-2xl text-center text-xs outline-none focus:border-red-500/50 border border-transparent">
                        <input type="number" placeholder="Reps" class="bg-black/20 p-4 rounded-2xl text-center text-xs outline-none focus:border-red-500/50 border border-transparent">
                    </div>
                </div>
            `).join('');

            seconds = 0;
            workoutTimer = setInterval(() => {
                seconds++;
                const min = Math.floor(seconds/60).toString().padStart(2,'0');
                const sec = (seconds%60).toString().padStart(2,'0');
                document.getElementById('timer').innerText = `${min}:${sec}`;
            }, 1000);
        };

        window.openDetail = (id) => {
            const ex = EXERCISES_DB.find(e => e.id === id);
            document.getElementById('modalTitle').innerText = ex.name;
            document.getElementById('modalGif').src = ex.gif;
            document.getElementById('modalExecution').innerText = ex.execution;
            document.getElementById('modalError').innerText = ex.error;
            document.getElementById('ex-modal-tags').innerHTML = ex.muscles.map(m => `<span class="bg-red-500/10 text-red-500 text-[8px] px-3 py-1 rounded-full font-black">${m}</span>`).join('');
            document.getElementById('exercise-modal').classList.remove('hidden');
        };

        document.getElementById('btn-finish-workout').onclick = async () => {
            clearInterval(workoutTimer);
            await addDoc(collection(db, 'users', currentUser.uid, 'workouts'), { date: new Date().toISOString(), duration: seconds });
            showToast("Treino Salvo com Sucesso!");
            location.reload();
        };

        // NAV
        document.querySelectorAll('.nav-btn').forEach(btn => {
            btn.onclick = () => {
                const tab = btn.id.split('-')[1];
                document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
                document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
                document.getElementById(`tab-${tab}`).classList.add('active');
                btn.classList.add('active');
            }
        });

        document.getElementById('btn-logout').onclick = () => signOut(auth);
    </script>
</body>
</html>
