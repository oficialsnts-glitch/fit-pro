<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#111827">
<title>FitPro Max Cloud AI</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<!-- Firebase SDKs -->
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
  import { getAuth, signInWithCustomToken, signInAnonymously, onAuthStateChanged, signOut, signInWithEmailAndPassword, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
  import { getFirestore, doc, setDoc, getDoc, collection, onSnapshot, query, addDoc, updateDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

  // Configurações globais
  const firebaseConfig = JSON.parse(__firebase_config);
  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getFirestore(app);
  const appId = typeof __app_id !== 'undefined' ? __app_id : 'fitpro-max-ai-v2';
  const apiKey = ""; // Gemini API Key

  let currentUser = null;
  let userData = {
    profile: { name: '', weight: 0, height: 0, goal: 'gain', age: 25 },
    weights: [],
    workouts: []
  };

  // --- AUTENTICAÇÃO ---
  onAuthStateChanged(auth, (user) => {
    currentUser = user;
    if (user) {
      document.getElementById('login-screen').classList.add('hidden');
      document.getElementById('main-app').classList.remove('hidden');
      setupUserDatabase(user.uid);
    } else {
      document.getElementById('login-screen').classList.remove('hidden');
      document.getElementById('main-app').classList.add('hidden');
    }
  });

  // Login com E-mail e Senha
  window.handleAuth = async () => {
    const email = document.getElementById('auth-email').value;
    const pass = document.getElementById('auth-pass').value;
    const isRegister = document.getElementById('auth-mode').value === 'register';

    if(!email || !pass) return showToast("Preencha todos os campos");

    try {
      if (isRegister) {
        await createUserWithEmailAndPassword(auth, email, pass);
        showToast("Conta criada com sucesso!");
      } else {
        await signInWithEmailAndPassword(auth, email, pass);
      }
    } catch (err) {
      console.error(err);
      let msg = "Erro na autenticação";
      if(err.code === 'auth/email-already-in-use') msg = "Este e-mail já está em uso";
      if(err.code === 'auth/invalid-credential') msg = "E-mail ou senha incorretos";
      if(err.code === 'auth/weak-password') msg = "A senha deve ter pelo menos 6 caracteres";
      showToast(msg);
    }
  };

  window.toggleAuthMode = () => {
    const mode = document.getElementById('auth-mode');
    const title = document.getElementById('auth-title');
    const btn = document.getElementById('auth-btn');
    const link = document.getElementById('auth-link');

    if (mode.value === 'login') {
      mode.value = 'register';
      title.innerText = "Criar Conta";
      btn.innerText = "Registrar Agora";
      link.innerText = "Já tem conta? Entre aqui";
    } else {
      mode.value = 'login';
      title.innerText = "Entrar";
      btn.innerText = "Acessar conta";
      link.innerText = "Novo aqui? Crie uma conta";
    }
  };

  // Função para mostrar/esconder senha
  window.togglePasswordVisibility = () => {
    const passInput = document.getElementById('auth-pass');
    const icon = document.getElementById('toggle-pass-icon');
    if (passInput.type === 'password') {
      passInput.type = 'text';
      icon.classList.replace('fa-eye', 'fa-eye-slash');
    } else {
      passInput.type = 'password';
      icon.classList.replace('fa-eye-slash', 'fa-eye');
    }
  };

  // --- ESCUTA DE DADOS INDIVIDUAIS ---
  const setupUserDatabase = (uid) => {
    const profileRef = doc(db, 'artifacts', appId, 'users', uid, 'settings', 'profile');
    onSnapshot(profileRef, (docSnap) => {
      if (docSnap.exists()) {
        userData.profile = docSnap.data();
        updateDashboard();
        fillProfileFields();
      }
    }, (err) => console.error(err));

    const weightsRef = collection(db, 'artifacts', appId, 'users', uid, 'weights');
    onSnapshot(weightsRef, (snap) => {
      userData.weights = snap.docs.map(d => d.data()).sort((a,b) => new Date(a.date) - new Date(b.date));
      renderChart();
    }, (err) => console.error(err));

    const workoutsRef = collection(db, 'artifacts', appId, 'users', uid, 'workouts');
    onSnapshot(workoutsRef, (snap) => {
      userData.workouts = snap.docs.map(d => ({id: d.id, ...d.data()}));
      renderWorkoutList();
    }, (err) => console.error(err));
  };

  // --- AÇÕES DE ESCRITA ---
  window.saveProfile = async () => {
    if (!currentUser) return;
    const profile = {
      name: document.getElementById('p-name').value,
      weight: parseFloat(document.getElementById('p-weight').value) || 0,
      height: parseFloat(document.getElementById('p-height').value) || 0,
      goal: document.getElementById('p-goal').value,
      age: parseInt(document.getElementById('p-age').value) || 0,
      updatedAt: new Date().toISOString()
    };
    try {
      const ref = doc(db, 'artifacts', appId, 'users', currentUser.uid, 'settings', 'profile');
      await setDoc(ref, profile, { merge: true });
      showToast("Dados salvos!");
    } catch (e) { showToast("Erro ao salvar."); }
  };

  window.addWeightEntry = async () => {
    if (!currentUser) return;
    const val = parseFloat(document.getElementById('new-weight-val').value);
    if (!val) return;
    try {
      const ref = collection(db, 'artifacts', appId, 'users', currentUser.uid, 'weights');
      await addDoc(ref, { weight: val, date: new Date().toISOString() });
      document.getElementById('new-weight-val').value = '';
      showToast("Peso registrado!");
    } catch (e) { showToast("Erro ao registrar."); }
  };

  // --- INTEGRAÇÃO GEMINI ---
  window.generateWorkoutPlan = async () => {
    if (!currentUser || !userData.profile.weight) {
      showToast("Preencha o perfil primeiro!");
      showTab('profile');
      return;
    }

    const btn = document.getElementById('btn-gen-workout');
    btn.disabled = true;
    btn.innerHTML = '<i class="fas fa-spinner fa-spin mr-2"></i> IA trabalhando...';

    const prompt = `Como um Personal Trainer especializado brasileiro, crie um plano de treino diário para:
      Nome: ${userData.profile.name}, Peso: ${userData.profile.weight}kg, Objetivo: ${userData.profile.goal}.
      Retorne APENAS um JSON no formato: { "title": "Nome do Treino", "exercises": ["Exercício 1 - 3x12", "Exercício 2 - 4x10"] }`;

    try {
      const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          contents: [{ parts: [{ text: prompt }] }],
          generationConfig: { responseMimeType: "application/json" }
        })
      });
      const data = await response.json();
      const workout = JSON.parse(data.candidates[0].content.parts[0].text);
      
      const ref = collection(db, 'artifacts', appId, 'users', currentUser.uid, 'workouts');
      await addDoc(ref, { ...workout, createdAt: new Date().toISOString() });
      showToast("Treino gerado!");
    } catch (err) {
      showToast("Erro na IA.");
    } finally {
      btn.disabled = false;
      btn.innerHTML = '✨ Gerar Plano Personalizado';
    }
  };

  window.handleLogout = () => signOut(auth);

  window.showTab = (id) => {
    document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
    document.getElementById('tab-' + id).classList.add('active');
    document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
    const btnIdx = {home: 0, workout: 1, profile: 2}[id];
    document.querySelectorAll('.nav-btn')[btnIdx].classList.add('active');
  };

</script>

<style>
  :root { --bg: #0a0f1a; --card: #161e2d; --accent: #ef4444; }
  body { background: var(--bg); color: #fff; font-family: 'Inter', sans-serif; -webkit-font-smoothing: antialiased; }
  .card { background: var(--card); border: 1px solid rgba(255,255,255,0.05); }
  .tab-content { display: none; }
  .tab-content.active { display: block; animation: slideUp 0.3s ease-out; }
  @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
  .nav-btn.active { color: var(--accent); }
  .btn-press:active { transform: scale(0.96); }
</style>
</head>
<body class="overflow-x-hidden">

  <div id="toast" class="hidden fixed top-6 left-1/2 -translate-x-1/2 bg-red-600 text-white px-8 py-3 rounded-full z-[200] shadow-2xl font-bold text-sm"></div>

  <!-- LOGIN SCREEN -->
  <div id="login-screen" class="fixed inset-0 z-[100] bg-gray-950 flex flex-col items-center justify-center p-8 text-center overflow-y-auto">
    <div class="w-20 h-20 bg-red-600 rounded-2xl flex items-center justify-center mb-8 shadow-xl">
      <i class="fas fa-dumbbell text-4xl"></i>
    </div>
    <h1 id="auth-title" class="text-3xl font-black italic mb-2 tracking-tighter uppercase">Entrar</h1>
    <p class="text-gray-500 mb-8 text-xs font-bold tracking-widest uppercase">FitPro Max Cloud AI</p>
    
    <div class="w-full max-w-xs space-y-4">
      <input type="hidden" id="auth-mode" value="login">
      
      <div class="space-y-1 text-left">
        <label class="text-[10px] font-black text-gray-600 ml-1">E-MAIL</label>
        <input id="auth-email" type="email" placeholder="exemplo@email.com" class="w-full bg-gray-900 border border-white/5 p-4 rounded-xl outline-none focus:border-red-500 text-sm">
      </div>

      <div class="space-y-1 text-left relative">
        <label class="text-[10px] font-black text-gray-600 ml-1">SENHA</label>
        <div class="relative">
          <input id="auth-pass" type="password" placeholder="••••••••" class="w-full bg-gray-900 border border-white/5 p-4 pr-12 rounded-xl outline-none focus:border-red-500 text-sm">
          <button onclick="togglePasswordVisibility()" class="absolute right-4 top-1/2 -translate-y-1/2 text-gray-500 hover:text-white">
            <i id="toggle-pass-icon" class="fas fa-eye"></i>
          </button>
        </div>
      </div>

      <button id="auth-btn" onclick="handleAuth()" class="w-full bg-red-600 py-4 rounded-xl font-black text-sm uppercase shadow-xl btn-press">Acessar conta</button>
      
      <button id="auth-link" onclick="toggleAuthMode()" class="w-full text-gray-500 text-[10px] font-bold uppercase tracking-widest pt-2">Novo aqui? Crie uma conta</button>
    </div>
  </div>

  <!-- MAIN APP -->
  <div id="main-app" class="hidden min-h-screen flex flex-col max-w-md mx-auto relative">
    
    <main class="flex-1 pb-32 pt-6 px-6 overflow-y-auto">
      
      <section id="tab-home" class="tab-content active">
        <header class="flex justify-between items-center mb-10">
          <div>
            <h2 class="text-2xl font-black italic uppercase">BOM DIA, <span id="dash-name" class="text-red-500">...</span></h2>
            <p id="dash-date" class="text-[10px] text-gray-500 font-bold uppercase tracking-widest mt-1"></p>
          </div>
          <button onclick="showTab('profile')" class="w-12 h-12 bg-gray-800 rounded-2xl flex items-center justify-center border border-gray-700 shadow-lg"><i class="fas fa-user-ninja"></i></button>
        </header>

        <div class="card p-6 rounded-[2.5rem] mb-8 bg-gradient-to-br from-red-600/10 to-transparent border-red-500/10">
          <div class="flex items-center gap-2 mb-4">
            <div class="w-2 h-2 bg-red-500 rounded-full animate-pulse"></div>
            <span class="text-[10px] font-black uppercase tracking-widest text-red-500">Coach Online</span>
          </div>
          <div id="ai-response" class="text-gray-200 text-sm mb-6 leading-relaxed">Qual o foco do treino hoje?</div>
          <div class="relative">
            <input id="ai-prompt" type="text" placeholder="Fale com seu Coach..." class="w-full bg-black/40 border border-white/5 rounded-2xl px-5 py-4 text-sm outline-none">
            <button onclick="showToast('A IA está em modo de visualização')" class="absolute right-2 top-2 bottom-2 bg-red-600 w-10 h-10 rounded-xl flex items-center justify-center"><i class="fas fa-arrow-up"></i></button>
          </div>
        </div>

        <div class="grid grid-cols-2 gap-4 mb-8">
          <div class="card p-5 rounded-3xl">
            <p class="text-[9px] text-gray-500 font-black mb-1 uppercase">Peso Atual</p>
            <p id="dash-weight" class="text-2xl font-black">-- <span class="text-xs text-gray-500 font-normal">kg</span></p>
          </div>
          <div class="card p-5 rounded-3xl">
            <p class="text-[9px] text-gray-500 font-black mb-1 uppercase">Meta Kcal</p>
            <p id="dash-kcal" class="text-2xl font-black">-- <span class="text-xs text-gray-500 font-normal">kcal</span></p>
          </div>
        </div>

        <div class="card p-6 rounded-[2.5rem]">
          <h4 class="text-[10px] font-black text-gray-500 mb-4 tracking-widest uppercase">Evolução de Peso</h4>
          <canvas id="weight-chart"></canvas>
        </div>
      </section>

      <section id="tab-workout" class="tab-content">
        <div class="flex justify-between items-end mb-8">
          <h2 class="text-3xl font-black italic uppercase">Meus<br><span class="text-red-500">Planos</span></h2>
          <button id="btn-gen-workout" onclick="generateWorkoutPlan()" class="bg-white text-black text-[10px] font-black px-4 py-3 rounded-full shadow-xl">✨ GERAR COM IA</button>
        </div>
        <div id="workout-list" class="space-y-4"></div>
      </section>

      <section id="tab-profile" class="tab-content">
        <h2 class="text-3xl font-black italic mb-8 uppercase">Meu<br><span class="text-red-500">Perfil</span></h2>
        <div class="space-y-6">
          <div class="space-y-2">
            <label class="text-[10px] font-black text-gray-600 ml-1 text-xs uppercase">Seu Nome</label>
            <input id="p-name" type="text" class="w-full card p-5 rounded-2xl outline-none focus:border-red-500/50">
          </div>
          <div class="grid grid-cols-2 gap-4">
            <input id="p-weight" type="number" placeholder="Peso (kg)" class="w-full card p-5 rounded-2xl outline-none">
            <input id="p-height" type="number" placeholder="Altura (cm)" class="w-full card p-5 rounded-2xl outline-none">
          </div>
          <div class="space-y-2">
            <label class="text-[10px] font-black text-gray-600 ml-1 text-xs uppercase">Seu Objetivo</label>
            <select id="p-goal" class="w-full card p-5 rounded-2xl outline-none">
              <option value="gain">Ganho de Massa</option>
              <option value="lose">Perda de Gordura</option>
              <option value="maintain">Manutenção</option>
            </select>
          </div>
          <input id="p-age" type="number" placeholder="Idade" class="w-full card p-5 rounded-2xl outline-none">
          <button onclick="saveProfile()" class="w-full bg-red-600 py-5 rounded-[2rem] font-black text-sm uppercase shadow-2xl">Salvar Alterações</button>
          
          <div class="pt-8 border-t border-gray-800">
            <h4 class="text-[10px] font-black text-gray-600 mb-3 tracking-widest uppercase">Registrar Peso de Hoje</h4>
            <div class="flex gap-2">
              <input id="new-weight-val" type="number" step="0.1" placeholder="Ex: 75.5" class="flex-1 bg-gray-900 p-5 rounded-2xl outline-none border border-transparent">
              <button onclick="addWeightEntry()" class="bg-gray-800 w-16 rounded-2xl flex items-center justify-center"><i class="fas fa-plus"></i></button>
            </div>
          </div>
          <button onclick="handleLogout()" class="w-full py-4 text-gray-600 text-[10px] font-black uppercase tracking-widest opacity-40">Sair da Conta</button>
        </div>
      </section>
    </main>

    <nav class="fixed bottom-0 w-full max-w-md bg-gray-950/90 backdrop-blur-xl border-t border-white/5 flex justify-around py-6 pb-10 z-50 rounded-t-[3rem]">
      <button onclick="showTab('home')" class="nav-btn active flex flex-col items-center flex-1">
        <i class="fas fa-bolt-lightning text-xl mb-1"></i>
        <span class="text-[8px] font-black uppercase tracking-widest">Início</span>
      </button>
      <button onclick="showTab('workout')" class="nav-btn flex flex-col items-center flex-1">
        <i class="fas fa-layer-group text-xl mb-1"></i>
        <span class="text-[8px] font-black uppercase tracking-widest">Treinos</span>
      </button>
      <button onclick="showTab('profile')" class="nav-btn flex flex-col items-center flex-1">
        <i class="fas fa-fingerprint text-xl mb-1"></i>
        <span class="text-[8px] font-black uppercase tracking-widest">Perfil</span>
      </button>
    </nav>
  </div>

  <script>
    function showToast(msg) {
      const t = document.getElementById('toast');
      t.innerText = msg;
      t.classList.remove('hidden');
      setTimeout(() => t.classList.add('hidden'), 3000);
    }
    function updateDashboard() {
      document.getElementById('dash-name').innerText = userData.profile.name || "Atleta";
      document.getElementById('dash-weight').innerText = userData.profile.weight || "--";
      document.getElementById('dash-date').innerText = new Date().toLocaleDateString('pt-BR', { weekday: 'long', day: 'numeric', month: 'short' });
      if(userData.profile.weight) {
        const factor = userData.profile.goal === 'gain' ? 35 : 24;
        document.getElementById('dash-kcal').innerText = Math.round(userData.profile.weight * factor);
      }
    }
    function fillProfileFields() {
      document.getElementById('p-name').value = userData.profile.name || "";
      document.getElementById('p-weight').value = userData.profile.weight || "";
      document.getElementById('p-height').value = userData.profile.height || "";
      document.getElementById('p-goal').value = userData.profile.goal || "gain";
      document.getElementById('p-age').value = userData.profile.age || "";
    }
    function renderWorkoutList() {
      const container = document.getElementById('workout-list');
      container.innerHTML = userData.workouts.length === 0 ? '<p class="text-center py-20 opacity-20 text-xs font-black uppercase">Nenhum treino gerado.</p>' :
      userData.workouts.map(w => `
        <div class="card p-7 rounded-[2.5rem]">
          <h3 class="text-xl font-black italic mb-4 uppercase">${w.title}</h3>
          <div class="space-y-3">${w.exercises.map(ex => `<div class="text-sm text-gray-300">• ${ex}</div>`).join('')}</div>
        </div>
      `).join('');
    }
    let chartInstance = null;
    function renderChart() {
      const ctx = document.getElementById('weight-chart');
      if (!ctx || userData.weights.length === 0) return;
      const labels = userData.weights.slice(-7).map(w => new Date(w.date).toLocaleDateString('pt-BR', {day: '2-digit'}));
      const data = userData.weights.slice(-7).map(w => w.weight);
      if (chartInstance) chartInstance.destroy();
      chartInstance = new Chart(ctx, {
        type: 'line',
        data: { labels, datasets: [{ data, borderColor: '#ef4444', borderWidth: 3, tension: 0.4, fill: true, backgroundColor: 'rgba(239, 68, 68, 0.05)' }] },
        options: { plugins: { legend: { display: false } }, scales: { y: { display: false }, x: { grid: { display: false }, ticks: { color: '#666' } } } }
      });
    }
  </script>

</body>
</html>
