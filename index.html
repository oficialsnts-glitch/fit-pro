<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#0a0f1a">
    <title>FitPro Max Cloud AI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root { --bg: #070b14; --card: #121826; --accent: #ef4444; }
        body { background: var(--bg); color: #fff; font-family: 'Inter', sans-serif; -webkit-font-smoothing: antialiased; overflow-x: hidden; }
        .card { background: var(--card); border: 1px solid rgba(255,255,255,0.05); }
        .tab-content { display: none; }
        .tab-content.active { display: block; animation: fadeIn 0.4s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .nav-btn.active { color: var(--accent); }
        .btn-gradient { background: linear-gradient(135deg, #ef4444, #991b1b); }
        .workout-checkbox:checked + span { text-decoration: line-through; color: #4b5563; }
        #onboarding-overlay { backdrop-filter: blur(10px); }
    </style>
</head>
<body>

    <div id="toast" class="hidden fixed top-6 left-1/2 -translate-x-1/2 bg-red-600 text-white px-8 py-3 rounded-full z-[200] shadow-2xl font-bold text-xs uppercase text-center min-w-[250px]"></div>

    <div id="login-screen" class="fixed inset-0 z-[100] bg-[#070b14] flex flex-col items-center justify-center p-10">
        <div class="w-16 h-16 bg-red-600 rounded-2xl flex items-center justify-center mb-6 shadow-2xl rotate-3">
            <i class="fas fa-bolt text-3xl"></i>
        </div>
        <h1 id="auth-title" class="text-3xl font-black italic mb-1 uppercase tracking-tighter">Entrar</h1>
        <p class="text-gray-500 text-[10px] font-bold uppercase tracking-[0.2em] mb-10">FitPro Max AI</p>
        
        <div class="w-full max-w-xs space-y-4">
            <input type="hidden" id="auth-mode" value="login">
            <input id="auth-email" type="email" placeholder="Email" class="w-full p-4 rounded-2xl outline-none text-sm">
            <input id="auth-pass" type="password" placeholder="Senha" class="w-full p-4 rounded-2xl outline-none text-sm">
            <button id="auth-btn" class="w-full btn-gradient py-4 rounded-2xl font-black text-xs uppercase shadow-xl active:scale-95 transition-transform">Acessar</button>
            <button id="auth-link-btn" class="w-full text-gray-600 text-[9px] font-bold uppercase tracking-widest pt-2">Criar nova conta</button>
        </div>
    </div>

    <div id="onboarding-overlay" class="hidden fixed inset-0 z-[150] bg-black/80 flex items-center justify-center p-6">
        <div class="card w-full max-w-sm p-8 rounded-[2.5rem] border-red-500/20 border">
            <h2 class="text-2xl font-black italic uppercase mb-2">Bem-vindo!</h2>
            <p class="text-gray-400 text-xs mb-6 font-medium">Precisamos de alguns dados para a IA montar seu plano.</p>
            <div class="space-y-4">
                <input id="on-name" type="text" placeholder="Seu nome" class="w-full p-4 rounded-2xl outline-none text-sm bg-[#1a2233]">
                <div class="grid grid-cols-2 gap-3">
                    <input id="on-weight" type="number" placeholder="Peso (kg)" class="w-full p-4 rounded-2xl outline-none text-sm bg-[#1a2233]">
                    <input id="on-height" type="number" placeholder="Altura (cm)" class="w-full p-4 rounded-2xl outline-none text-sm bg-[#1a2233]">
                </div>
                <select id="on-goal" class="w-full p-4 rounded-2xl outline-none text-sm bg-[#1a2233]">
                    <option value="gain">Ganho de Massa</option>
                    <option value="lose">Emagrecimento</option>
                    <option value="maintain">Manutenção</option>
                </select>
                <button id="btn-finish-onboarding" class="w-full btn-gradient py-4 rounded-2xl font-black text-xs uppercase shadow-xl">Começar Agora</button>
            </div>
        </div>
    </div>

    <div id="main-app" class="hidden min-h-screen flex flex-col max-w-md mx-auto">
        <main class="flex-1 pb-32 pt-8 px-6 overflow-y-auto">
            
            <section id="tab-home" class="tab-content active">
                <div class="flex justify-between items-center mb-8">
                    <div>
                        <p class="text-[10px] font-black text-red-500 uppercase tracking-widest mb-1">Status de Hoje</p>
                        <h2 class="text-3xl font-black italic uppercase leading-none"><span id="dash-name">...</span></h2>
                    </div>
                </div>

                <div class="grid grid-cols-2 gap-4 mb-8">
                    <div class="card p-5 rounded-[2rem]">
                        <span class="text-[9px] font-black text-gray-500 uppercase tracking-widest mb-4 block">Peso</span>
                        <p class="text-2xl font-black"><span id="dash-weight">--</span> <span class="text-[10px] text-gray-600 font-normal">KG</span></p>
                    </div>
                    <div class="card p-5 rounded-[2rem]">
                        <span class="text-[9px] font-black text-gray-500 uppercase tracking-widest mb-4 block">Calorias (Meta)</span>
                        <p class="text-2xl font-black"><span id="dash-kcal">--</span> <span class="text-[10px] text-gray-600 font-normal">KCAL</span></p>
                    </div>
                </div>

                <div class="card p-6 rounded-[2.5rem]">
                    <h4 class="text-[10px] font-black text-gray-500 uppercase tracking-widest mb-4">Progresso de Peso</h4>
                    <canvas id="weight-chart" height="150"></canvas>
                </div>
            </section>

            <section id="tab-workout" class="tab-content">
                <div class="flex justify-between items-end mb-6">
                    <h2 class="text-4xl font-black italic uppercase leading-none">Minha<br><span class="text-red-500">Rotina</span></h2>
                    <button id="btn-gen-workout" class="bg-white text-black w-14 h-14 rounded-2xl flex items-center justify-center shadow-xl active:scale-90 transition-transform">
                        <i class="fas fa-wand-magic-sparkles"></i>
                    </button>
                </div>

                <div class="mb-6">
                    <p class="text-[10px] font-black text-gray-600 uppercase mb-3">Escolha o foco da próxima geração:</p>
                    <div class="flex gap-2 overflow-x-auto no-scrollbar" id="focus-container">
                        <button class="focus-item active bg-[#1a2233] px-4 py-2 rounded-xl text-[10px] font-bold uppercase border border-white/5" data-focus="Peito e Tríceps">Peito/Tríceps</button>
                        <button class="focus-item bg-[#1a2233] px-4 py-2 rounded-xl text-[10px] font-bold uppercase border border-white/5" data-focus="Costas e Bíceps">Costas/Bíceps</button>
                        <button class="focus-item bg-[#1a2233] px-4 py-2 rounded-xl text-[10px] font-bold uppercase border border-white/5" data-focus="Pernas Completo">Pernas</button>
                        <button class="focus-item bg-[#1a2233] px-4 py-2 rounded-xl text-[10px] font-bold uppercase border border-white/5" data-focus="Ombros">Ombros</button>
                    </div>
                </div>
                
                <div id="active-workout-container" class="hidden mb-10">
                    <div class="card p-6 rounded-[2.2rem] border-2 border-red-500/40 bg-red-950/10 shadow-[0_0_30px_-10px_rgba(239,68,68,0.3)]">
                        <h3 class="text-xl font-black italic uppercase mb-5" id="active-workout-title">Treino Ativo</h3>
                        <div class="space-y-4" id="active-workout-exercises"></div>
                    </div>
                </div>

                <div id="workout-list" class="space-y-4"></div>
            </section>

            <section id="tab-profile" class="tab-content">
                <h2 class="text-4xl font-black italic uppercase mb-10">Perfil</h2>
                <button id="btn-logout" class="w-full py-6 text-red-500 text-[9px] font-black uppercase tracking-widest border border-red-500/20 rounded-2xl">Encerrar Sessão</button>
            </section>
        </main>

        <nav class="fixed bottom-0 w-full max-w-md bg-gray-950/90 backdrop-blur-2xl border-t border-white/5 flex justify-around py-8 px-4 z-50 rounded-t-[3rem]">
            <button id="nav-home" class="nav-btn active flex flex-col items-center flex-1">
                <i class="fas fa-chart-pie text-lg mb-1"></i>
                <span class="text-[8px] font-black uppercase">Home</span>
            </button>
            <button id="nav-workout" class="nav-btn flex flex-col items-center flex-1">
                <i class="fas fa-dumbbell text-lg mb-1"></i>
                <span class="text-[8px] font-black uppercase">Treino</span>
            </button>
            <button id="nav-profile" class="nav-btn flex flex-col items-center flex-1">
                <i class="fas fa-user-gear text-lg mb-1"></i>
                <span class="text-[8px] font-black uppercase">Conta</span>
            </button>
        </nav>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc, collection, onSnapshot, addDoc, query, orderBy, limit } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyB-OVW28besAOq2gi9b6Et9EqIajLS-uwY",
            authDomain: "fit-pro-985ac.firebaseapp.com",
            projectId: "fit-pro-985ac",
            storageBucket: "fit-pro-985ac.firebasestorage.app",
            messagingSenderId: "809428255492",
            appId: "1:809428255492:web:c59ee6687310b8a3004651"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const GROQ_API_KEY = "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";

        let currentUser = null;
        let userData = { profile: null, weights: [], workouts: [] };
        let weightChart = null;

        const showToast = (msg, type = 'error') => {
            const t = document.getElementById('toast');
            t.innerText = msg;
            t.className = `fixed top-6 left-1/2 -translate-x-1/2 px-8 py-3 rounded-full z-[200] shadow-2xl font-bold text-xs uppercase text-center min-w-[250px] ${type === 'success' ? 'bg-green-600' : 'bg-red-600'} text-white`;
            t.classList.remove('hidden');
            setTimeout(() => t.classList.add('hidden'), 3000);
        };

        const changeTab = (id) => {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.getElementById('tab-' + id).classList.add('active');
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('nav-' + id).classList.add('active');
        };

        document.getElementById('nav-home').onclick = () => changeTab('home');
        document.getElementById('nav-workout').onclick = () => changeTab('workout');
        document.getElementById('nav-profile').onclick = () => changeTab('profile');

        // AUTH
        document.getElementById('auth-btn').onclick = async () => {
            const email = document.getElementById('auth-email').value;
            const pass = document.getElementById('auth-pass').value;
            const mode = document.getElementById('auth-mode').value;
            try {
                if (mode === 'register') await createUserWithEmailAndPassword(auth, email, pass);
                else await signInWithEmailAndPassword(auth, email, pass);
            } catch (err) { showToast(err.message); }
        };

        document.getElementById('auth-link-btn').onclick = () => {
            const mode = document.getElementById('auth-mode');
            const isLogin = mode.value === 'login';
            mode.value = isLogin ? 'register' : 'login';
            document.getElementById('auth-title').innerText = isLogin ? "Criar Conta" : "Entrar";
            document.getElementById('auth-btn').innerText = isLogin ? "Registrar" : "Acessar";
        };

        onAuthStateChanged(auth, async (user) => {
            currentUser = user;
            if (user) {
                document.getElementById('login-screen').classList.add('hidden');
                document.getElementById('main-app').classList.remove('hidden');
                checkOnboarding(user.uid);
            } else {
                document.getElementById('login-screen').classList.remove('hidden');
                document.getElementById('main-app').classList.add('hidden');
                document.getElementById('onboarding-overlay').classList.add('hidden');
            }
        });

        async function checkOnboarding(uid) {
            const docRef = doc(db, 'users', uid, 'settings', 'profile');
            const docSnap = await getDoc(docRef);
            
            if (!docSnap.exists()) {
                document.getElementById('onboarding-overlay').classList.remove('hidden');
            } else {
                userData.profile = docSnap.data();
                startSync(uid);
            }
        }

        document.getElementById('btn-finish-onboarding').onclick = async () => {
            const profile = {
                name: document.getElementById('on-name').value,
                weight: parseFloat(document.getElementById('on-weight').value),
                height: parseFloat(document.getElementById('on-height').value),
                goal: document.getElementById('on-goal').value,
                date: new Date().toISOString()
            };
            if(!profile.name || !profile.weight) return showToast("Preencha os dados básicos");
            
            await setDoc(doc(db, 'users', currentUser.uid, 'settings', 'profile'), profile);
            document.getElementById('onboarding-overlay').classList.add('hidden');
            userData.profile = profile;
            startSync(currentUser.uid);
            showToast("Perfil criado!", "success");
        };

        function startSync(uid) {
            // Dashboard data
            onSnapshot(doc(db, 'users', uid, 'settings', 'profile'), (s) => {
                if(s.exists()){
                    userData.profile = s.data();
                    document.getElementById('dash-name').innerText = userData.profile.name;
                    document.getElementById('dash-weight').innerText = userData.profile.weight;
                    const factor = userData.profile.goal === 'gain' ? 35 : 25;
                    document.getElementById('dash-kcal').innerText = Math.round(userData.profile.weight * factor);
                }
            });

            // Weights
            onSnapshot(query(collection(db, 'users', uid, 'weights'), orderBy('date', 'asc')), (s) => {
                userData.weights = s.docs.map(d => d.data());
                renderChart();
            });

            // Workouts
            onSnapshot(query(collection(db, 'users', uid, 'workouts'), orderBy('date', 'desc'), limit(10)), (s) => {
                userData.workouts = s.docs.map(d => d.data());
                if(userData.workouts.length > 0) renderActiveWorkout(userData.workouts[0]);
                renderHistory();
            });
        }

        function renderChart() {
            const ctx = document.getElementById('weight-chart');
            if(!ctx || userData.weights.length < 2) return;
            if(weightChart) weightChart.destroy();
            weightChart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: userData.weights.slice(-7).map(w => new Date(w.date).toLocaleDateString('pt-BR', {day:'2-digit'})),
                    datasets: [{ data: userData.weights.slice(-7).map(w => w.weight), borderColor: '#ef4444', tension: 0.4, fill: true, backgroundColor: 'rgba(239,68,68,0.1)' }]
                },
                options: { plugins: { legend: { display: false } }, scales: { y: { display: false }, x: { grid: { display: false } } } }
            });
        }

        function renderActiveWorkout(w) {
            const cont = document.getElementById('active-workout-container');
            const list = document.getElementById('active-workout-exercises');
            document.getElementById('active-workout-title').innerText = w.title;
            list.innerHTML = w.exercises.map((ex, i) => `
                <label class="flex items-center gap-4 p-4 rounded-2xl bg-[#1a2233] cursor-pointer">
                    <input type="checkbox" class="workout-checkbox w-5 h-5 rounded border-gray-700 bg-gray-800 text-red-600">
                    <span class="text-sm font-medium text-gray-200">${ex}</span>
                </label>
            `).join('');
            cont.classList.remove('hidden');
        }

        function renderHistory() {
            const list = document.getElementById('workout-list');
            list.innerHTML = userData.workouts.slice(1).map(w => `
                <div class="card p-5 rounded-[2rem] opacity-50">
                    <div class="flex justify-between text-[10px] font-black uppercase text-gray-500 mb-2">
                        <span>${w.title}</span>
                        <span>${new Date(w.date).toLocaleDateString()}</span>
                    </div>
                    <div class="text-[10px] text-gray-600 truncate">${w.exercises.join(', ')}</div>
                </div>
            `).join('');
        }

        document.querySelectorAll('.focus-item').forEach(btn => {
            btn.onclick = () => {
                document.querySelectorAll('.focus-item').forEach(b => b.classList.remove('active', 'bg-red-600'));
                btn.classList.add('active', 'bg-red-600');
            }
        });

        // AI GENERATOR
        document.getElementById('btn-gen-workout').onclick = async () => {
            const btn = document.getElementById('btn-gen-workout');
            const focus = document.querySelector('.focus-item.active').dataset.focus;
            btn.disabled = true;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i>';

            // Captura o último treino para evitar repetição
            const lastWorkoutTitle = userData.workouts.length > 0 ? userData.workouts[0].title : "Nenhum";

            const prompt = `Personal Trainer: O aluno deseja treinar ${focus}. 
            Objetivo: ${userData.profile.goal}. Peso: ${userData.profile.weight}kg.
            ATENÇÃO: O último treino dele foi "${lastWorkoutTitle}". 
            NÃO REPITA o mesmo treino. Se o último foi peito, sugira algo diferente ou uma variação intensa de descanso.
            Responda APENAS JSON: {"title": "Nome Criativo", "exercises": ["Ex - Séries x Reps"]}`;

            try {
                const res = await fetch(`https://api.groq.com/openai/v1/chat/completions`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${GROQ_API_KEY}` },
                    body: JSON.stringify({
                        model: "llama-3.1-8b-instant",
                        messages: [{ role: "user", content: prompt }],
                        response_format: { type: "json_object" }
                    })
                });

                const data = await res.json();
                const workout = JSON.parse(data.choices[0].message.content);
                await addDoc(collection(db, 'users', currentUser.uid, 'workouts'), { ...workout, date: new Date().toISOString() });
                showToast("Novo treino gerado com base no seu perfil!", "success");
            } catch (e) { showToast("Erro na IA."); }
            btn.disabled = false;
            btn.innerHTML = '<i class="fas fa-wand-magic-sparkles"></i>';
        };

        document.getElementById('btn-logout').onclick = () => signOut(auth);

    </script>
</body>
</html>
