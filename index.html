<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#0a0f1a">
<title>FitPro Max Cloud AI</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
  import { getAuth, signInWithCustomToken, signInAnonymously, onAuthStateChanged, signOut, signInWithEmailAndPassword, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
  import { getFirestore, doc, setDoc, getDoc, collection, onSnapshot, query, addDoc, updateDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

  const firebaseConfig = JSON.parse(__firebase_config);
  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getFirestore(app);
  const appId = typeof __app_id !== 'undefined' ? __app_id : 'fitpro-max-ai-v2';
  const apiKey = ""; 

  let currentUser = null;
  let userData = {
    profile: { name: '', weight: 0, height: 0, goal: 'gain', age: 25 },
    weights: [],
    workouts: []
  };

  onAuthStateChanged(auth, (user) => {
    currentUser = user;
    if (user) {
      document.getElementById('login-screen').classList.add('hidden');
      document.getElementById('main-app').classList.remove('hidden');
      setupUserDatabase(user.uid);
    } else {
      document.getElementById('login-screen').classList.remove('hidden');
      document.getElementById('main-app').classList.add('hidden');
    }
  });

  window.handleAuth = async () => {
    const email = document.getElementById('auth-email').value;
    const pass = document.getElementById('auth-pass').value;
    const isRegister = document.getElementById('auth-mode').value === 'register';
    if(!email || !pass) return window.showToast("Preencha todos os campos");
    try {
      if (isRegister) {
        await createUserWithEmailAndPassword(auth, email, pass);
        window.showToast("Bem-vindo ao time!");
      } else {
        await signInWithEmailAndPassword(auth, email, pass);
      }
    } catch (err) {
      window.showToast("Erro: Verifique seus dados");
    }
  };

  window.toggleAuthMode = () => {
    const mode = document.getElementById('auth-mode');
    const title = document.getElementById('auth-title');
    const btn = document.getElementById('auth-btn');
    const link = document.getElementById('auth-link');
    if (mode.value === 'login') {
      mode.value = 'register';
      title.innerText = "Criar Conta";
      btn.innerText = "Registrar Agora";
      link.innerText = "Já tem conta? Entre aqui";
    } else {
      mode.value = 'login';
      title.innerText = "Entrar";
      btn.innerText = "Acessar conta";
      link.innerText = "Novo aqui? Crie uma conta";
    }
  };

  const setupUserDatabase = (uid) => {
    const profileRef = doc(db, 'artifacts', appId, 'users', uid, 'settings', 'profile');
    onSnapshot(profileRef, (docSnap) => {
      if (docSnap.exists()) {
        userData.profile = docSnap.data();
        window.updateDashboard();
        window.fillProfileFields();
      }
    });

    const weightsRef = collection(db, 'artifacts', appId, 'users', uid, 'weights');
    onSnapshot(weightsRef, (snap) => {
      userData.weights = snap.docs.map(d => d.data()).sort((a,b) => new Date(a.date) - new Date(b.date));
      window.renderChart();
    });

    const workoutsRef = collection(db, 'artifacts', appId, 'users', uid, 'workouts');
    onSnapshot(workoutsRef, (snap) => {
      userData.workouts = snap.docs.map(d => ({id: d.id, ...d.data()}));
      window.renderWorkoutList();
    });
  };

  window.saveProfile = async () => {
    if (!currentUser) return;
    const profile = {
      name: document.getElementById('p-name').value,
      weight: parseFloat(document.getElementById('p-weight').value) || 0,
      height: parseFloat(document.getElementById('p-height').value) || 0,
      goal: document.getElementById('p-goal').value,
      age: parseInt(document.getElementById('p-age').value) || 0,
      updatedAt: new Date().toISOString()
    };
    try {
      const ref = doc(db, 'artifacts', appId, 'users', currentUser.uid, 'settings', 'profile');
      await setDoc(ref, profile, { merge: true });
      window.showToast("Perfil atualizado!");
    } catch (e) { window.showToast("Erro ao salvar."); }
  };

  window.addWeightEntry = async () => {
    if (!currentUser) return;
    const val = parseFloat(document.getElementById('new-weight-val').value);
    if (!val) return;
    try {
      const ref = collection(db, 'artifacts', appId, 'users', currentUser.uid, 'weights');
      await addDoc(ref, { weight: val, date: new Date().toISOString() });
      document.getElementById('new-weight-val').value = '';
      window.showToast("Peso registrado!");
    } catch (e) { window.showToast("Erro ao registrar."); }
  };

  window.generateWorkoutPlan = async () => {
    if (!currentUser || !userData.profile.weight) {
      window.showToast("Configure seu perfil primeiro!");
      window.showTab('profile');
      return;
    }
    const btn = document.getElementById('btn-gen-workout');
    btn.disabled = true;
    btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i>';
    const focus = document.querySelector('.focus-btn.active')?.dataset.focus || 'Geral';
    const prompt = `Personal Trainer IA: Crie um treino focado em ${focus} para ${userData.profile.name} (Meta: ${userData.profile.goal}). JSON: { "title": "Nome", "exercises": ["Ex 1 - 3x10"] }`;
    try {
      const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }], generationConfig: { responseMimeType: "application/json" } })
      });
      const data = await response.json();
      const workout = JSON.parse(data.candidates[0].content.parts[0].text);
      const ref = collection(db, 'artifacts', appId, 'users', currentUser.uid, 'workouts');
      await addDoc(ref, { ...workout, createdAt: new Date().toISOString() });
      window.showToast("Novo treino pronto!");
    } catch (err) { window.showToast("IA indisponível."); }
    finally { btn.disabled = false; btn.innerHTML = '✨ GERAR COM IA'; }
  };

  window.handleLogout = () => signOut(auth);

  window.showTab = (id) => {
    document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
    document.getElementById('tab-' + id).classList.add('active');
    document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
    const btnMap = {home: 0, workout: 1, profile: 2};
    document.querySelectorAll('.nav-btn')[btnMap[id]].classList.add('active');
  };

  window.setFocus = (el) => {
    document.querySelectorAll('.focus-btn').forEach(b => b.classList.remove('active'));
    el.classList.add('active');
  };

  window.showToast = (msg) => {
    const t = document.getElementById('toast');
    t.innerText = msg; t.classList.remove('hidden');
    setTimeout(() => t.classList.add('hidden'), 3000);
  };

  window.updateDashboard = () => {
    document.getElementById('dash-name').innerText = userData.profile.name || "Atleta";
    document.getElementById('dash-weight').innerText = userData.profile.weight || "--";
    const factor = userData.profile.goal === 'gain' ? 35 : 24;
    document.getElementById('dash-kcal').innerText = Math.round((userData.profile.weight || 70) * factor);
  };

  window.fillProfileFields = () => {
    document.getElementById('p-name').value = userData.profile.name || "";
    document.getElementById('p-weight').value = userData.profile.weight || "";
    document.getElementById('p-height').value = userData.profile.height || "";
    document.getElementById('p-goal').value = userData.profile.goal || "gain";
    document.getElementById('p-age').value = userData.profile.age || "";
  };

  window.renderWorkoutList = () => {
    const container = document.getElementById('workout-list');
    container.innerHTML = userData.workouts.length === 0 ? '<p class="text-center py-10 opacity-30 uppercase text-[10px] font-bold">Nenhum treino</p>' :
    userData.workouts.map(w => `
      <div class="card p-6 rounded-3xl border border-white/5">
        <h3 class="text-lg font-black italic uppercase text-red-500 mb-3">${w.title}</h3>
        <div class="space-y-2">${w.exercises.map(ex => `<div class="text-xs text-gray-400 font-medium flex items-center gap-2"><div class="w-1 h-1 bg-red-500 rounded-full"></div> ${ex}</div>`).join('')}</div>
      </div>
    `).join('');
  };

  let chartInstance = null;
  window.renderChart = () => {
    const ctx = document.getElementById('weight-chart');
    if (!ctx || userData.weights.length === 0) return;
    const labels = userData.weights.slice(-7).map(w => new Date(w.date).toLocaleDateString('pt-BR', {day: '2-digit'}));
    const data = userData.weights.slice(-7).map(w => w.weight);
    if (chartInstance) chartInstance.destroy();
    chartInstance = new Chart(ctx, {
      type: 'line',
      data: { labels, datasets: [{ data, borderColor: '#ef4444', borderWidth: 2, tension: 0.4, fill: true, backgroundColor: 'rgba(239, 68, 68, 0.05)', pointRadius: 0 }] },
      options: { plugins: { legend: { display: false } }, scales: { y: { display: false }, x: { grid: { display: false }, ticks: { color: '#444', font: { size: 10 } } } } }
    });
  };

  window.togglePasswordVisibility = () => {
    const passInput = document.getElementById('auth-pass');
    const icon = document.getElementById('toggle-pass-icon');
    if (passInput.type === 'password') {
      passInput.type = 'text';
      icon.classList.replace('fa-eye', 'fa-eye-slash');
    } else {
      passInput.type = 'password';
      icon.classList.replace('fa-eye-slash', 'fa-eye');
    }
  };
</script>

<style>
  :root { --bg: #070b14; --card: #121826; --accent: #ef4444; }
  body { background: var(--bg); color: #fff; font-family: 'Inter', sans-serif; -webkit-font-smoothing: antialiased; }
  .card { background: var(--card); }
  .tab-content { display: none; }
  .tab-content.active { display: block; animation: fadeIn 0.4s ease; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
  .nav-btn.active { color: var(--accent); }
  .focus-btn { background: #1a2233; border: 1px solid transparent; transition: 0.2s; }
  .focus-btn.active { border-color: var(--accent); background: rgba(239, 68, 68, 0.1); color: var(--accent); }
  input, select { background: #1a2233 !important; border: 1px solid rgba(255,255,255,0.05) !important; color: white !important; }
  .btn-gradient { background: linear-gradient(135deg, #ef4444, #991b1b); }
</style>
</head>
<body class="overflow-x-hidden">

  <div id="toast" class="hidden fixed top-6 left-1/2 -translate-x-1/2 bg-red-600 text-white px-8 py-3 rounded-full z-[200] shadow-2xl font-bold text-xs uppercase"></div>

  <!-- LOGIN -->
  <div id="login-screen" class="fixed inset-0 z-[100] bg-[#070b14] flex flex-col items-center justify-center p-10 text-center">
    <div class="w-16 h-16 bg-red-600 rounded-2xl flex items-center justify-center mb-6 shadow-2xl rotate-3">
      <i class="fas fa-bolt text-3xl"></i>
    </div>
    <h1 id="auth-title" class="text-3xl font-black italic mb-1 uppercase tracking-tighter">Entrar</h1>
    <p class="text-gray-500 text-[10px] font-bold uppercase tracking-[0.2em] mb-10">FitPro Max AI</p>
    <div class="w-full max-w-xs space-y-4">
      <input type="hidden" id="auth-mode" value="login">
      <input id="auth-email" type="email" placeholder="Email" class="w-full p-4 rounded-2xl outline-none text-sm">
      <div class="relative">
        <input id="auth-pass" type="password" placeholder="Senha" class="w-full p-4 rounded-2xl outline-none text-sm pr-12">
        <button onclick="togglePasswordVisibility()" class="absolute right-4 top-1/2 -translate-y-1/2 text-gray-500"><i id="toggle-pass-icon" class="fas fa-eye"></i></button>
      </div>
      <button id="auth-btn" onclick="handleAuth()" class="w-full btn-gradient py-4 rounded-2xl font-black text-xs uppercase shadow-xl">Acessar</button>
      <button id="auth-link" onclick="toggleAuthMode()" class="w-full text-gray-600 text-[9px] font-bold uppercase tracking-widest pt-2">Criar nova conta</button>
    </div>
  </div>

  <!-- MAIN -->
  <div id="main-app" class="hidden min-h-screen flex flex-col max-w-md mx-auto">
    <main class="flex-1 pb-32 pt-8 px-6">
      
      <section id="tab-home" class="tab-content active">
        <div class="flex justify-between items-center mb-8">
          <div>
            <p class="text-[10px] font-black text-red-500 uppercase tracking-widest mb-1">Status de Hoje</p>
            <h2 class="text-3xl font-black italic uppercase leading-none"><span id="dash-name">...</span></h2>
          </div>
          <div class="w-12 h-12 rounded-2xl bg-gray-800/50 border border-white/5 flex items-center justify-center">
            <i class="fas fa-bell text-gray-500"></i>
          </div>
        </div>

        <div class="grid grid-cols-2 gap-4 mb-8">
          <div class="card p-5 rounded-[2rem] border border-white/5">
            <div class="flex items-center gap-3 mb-4">
              <div class="w-8 h-8 rounded-xl bg-blue-500/10 flex items-center justify-center text-blue-500 text-xs">
                <i class="fas fa-weight-hanging"></i>
              </div>
              <span class="text-[9px] font-black text-gray-500 uppercase tracking-widest">Peso</span>
            </div>
            <p class="text-2xl font-black"><span id="dash-weight">--</span> <span class="text-[10px] text-gray-600">KG</span></p>
          </div>
          <div class="card p-5 rounded-[2rem] border border-white/5">
            <div class="flex items-center gap-3 mb-4">
              <div class="w-8 h-8 rounded-xl bg-orange-500/10 flex items-center justify-center text-orange-500 text-xs">
                <i class="fas fa-fire"></i>
              </div>
              <span class="text-[9px] font-black text-gray-500 uppercase tracking-widest">Meta</span>
            </div>
            <p class="text-2xl font-black"><span id="dash-kcal">--</span> <span class="text-[10px] text-gray-600">KCAL</span></p>
          </div>
        </div>

        <div class="mb-8">
          <h4 class="text-[10px] font-black text-gray-600 uppercase tracking-widest mb-4">Foco do Dia</h4>
          <div class="flex gap-3 overflow-x-auto pb-2 no-scrollbar">
            <button onclick="setFocus(this)" data-focus="Peito" class="focus-btn active px-6 py-3 rounded-2xl text-[10px] font-black uppercase whitespace-nowrap">Peito</button>
            <button onclick="setFocus(this)" data-focus="Costas" class="focus-btn px-6 py-3 rounded-2xl text-[10px] font-black uppercase whitespace-nowrap">Costas</button>
            <button onclick="setFocus(this)" data-focus="Pernas" class="focus-btn px-6 py-3 rounded-2xl text-[10px] font-black uppercase whitespace-nowrap">Pernas</button>
            <button onclick="setFocus(this)" data-focus="Cardio" class="focus-btn px-6 py-3 rounded-2xl text-[10px] font-black uppercase whitespace-nowrap">Cardio</button>
          </div>
        </div>

        <div class="card p-6 rounded-[2.5rem] border border-white/5 relative overflow-hidden">
          <div class="flex justify-between items-center mb-6">
            <h4 class="text-[10px] font-black text-gray-500 uppercase tracking-widest">Progresso Semanal</h4>
            <i class="fas fa-ellipsis-h text-gray-700"></i>
          </div>
          <canvas id="weight-chart" height="150"></canvas>
        </div>
      </section>

      <section id="tab-workout" class="tab-content">
        <div class="flex justify-between items-end mb-10">
          <h2 class="text-4xl font-black italic uppercase leading-none">Meus<br><span class="text-red-500">Planos</span></h2>
          <button id="btn-gen-workout" onclick="generateWorkoutPlan()" class="bg-white text-black w-14 h-14 rounded-2xl flex items-center justify-center shadow-xl">
            <i class="fas fa-wand-magic-sparkles"></i>
          </button>
        </div>
        <div id="workout-list" class="space-y-4"></div>
      </section>

      <section id="tab-profile" class="tab-content">
        <h2 class="text-4xl font-black italic uppercase mb-10">Meu<br><span class="text-red-500">Perfil</span></h2>
        <div class="space-y-5">
          <input id="p-name" type="text" placeholder="Nome" class="w-full p-5 rounded-2xl outline-none text-sm font-bold">
          <div class="grid grid-cols-2 gap-4">
            <input id="p-weight" type="number" placeholder="Peso (kg)" class="w-full p-5 rounded-2xl outline-none text-sm font-bold">
            <input id="p-height" type="number" placeholder="Altura (cm)" class="w-full p-5 rounded-2xl outline-none text-sm font-bold">
          </div>
          <select id="p-goal" class="w-full p-5 rounded-2xl outline-none text-sm font-bold appearance-none">
            <option value="gain">Ganho de Massa</option>
            <option value="lose">Definição</option>
          </select>
          <input id="p-age" type="number" placeholder="Idade" class="w-full p-5 rounded-2xl outline-none text-sm font-bold">
          <button onclick="saveProfile()" class="w-full btn-gradient py-5 rounded-3xl font-black text-xs uppercase shadow-2xl">Salvar Dados</button>
          
          <div class="pt-10 border-t border-white/5">
            <h4 class="text-[10px] font-black text-gray-600 uppercase tracking-widest mb-4">Peso de Hoje</h4>
            <div class="flex gap-3">
              <input id="new-weight-val" type="number" step="0.1" placeholder="00.0" class="flex-1 p-5 rounded-2xl outline-none text-sm font-bold">
              <button onclick="addWeightEntry()" class="bg-white text-black w-16 rounded-2xl flex items-center justify-center font-black"><i class="fas fa-check"></i></button>
            </div>
          </div>
          <button onclick="handleLogout()" class="w-full py-6 text-gray-700 text-[9px] font-black uppercase tracking-[0.3em]">Logout</button>
        </div>
      </section>
    </main>

    <nav class="fixed bottom-0 w-full max-w-md bg-gray-950/80 backdrop-blur-2xl border-t border-white/5 flex justify-around py-8 px-4 z-50 rounded-t-[3rem]">
      <button onclick="showTab('home')" class="nav-btn active flex flex-col items-center flex-1">
        <i class="fas fa-home-alt text-lg mb-1"></i>
        <span class="text-[8px] font-black uppercase tracking-widest">Dash</span>
      </button>
      <button onclick="showTab('workout')" class="nav-btn flex flex-col items-center flex-1">
        <i class="fas fa-dumbbell text-lg mb-1"></i>
        <span class="text-[8px] font-black uppercase tracking-widest">Treino</span>
      </button>
      <button onclick="showTab('profile')" class="nav-btn flex flex-col items-center flex-1">
        <i class="fas fa-user text-lg mb-1"></i>
        <span class="text-[8px] font-black uppercase tracking-widest">Conta</span>
      </button>
    </nav>
  </div>
</body>
</html>
