<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#0a0f1a">
    <title>FitPro Max Cloud AI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root { --bg: #070b14; --card: #121826; --accent: #ef4444; }
        body { background: var(--bg); color: #fff; font-family: 'Inter', sans-serif; -webkit-font-smoothing: antialiased; }
        .card { background: var(--card); border: 1px solid rgba(255,255,255,0.05); }
        .tab-content { display: none; }
        .tab-content.active { display: block; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .nav-btn.active { color: var(--accent); }
        .btn-gradient { background: linear-gradient(135deg, #ef4444, #991b1b); }
        .workout-checkbox:checked + span { text-decoration: line-through; color: #4b5563; }
        .modal { backdrop-filter: blur(8px); background: rgba(7, 11, 20, 0.8); }
    </style>
</head>
<body>

    <div id="toast" class="hidden fixed top-6 left-1/2 -translate-x-1/2 bg-red-600 text-white px-8 py-3 rounded-full z-[300] shadow-2xl font-bold text-xs uppercase text-center"></div>

    <div id="login-screen" class="fixed inset-0 z-[200] bg-[#070b14] flex flex-col items-center justify-center p-10">
        <div class="w-16 h-16 bg-red-600 rounded-2xl flex items-center justify-center mb-6 shadow-2xl rotate-3">
            <i class="fas fa-bolt text-3xl"></i>
        </div>
        <h1 id="auth-title" class="text-3xl font-black italic mb-1 uppercase tracking-tighter">Entrar</h1>
        <div class="w-full max-w-xs space-y-4">
            <input type="hidden" id="auth-mode" value="login">
            <input id="auth-email" type="email" placeholder="Email" class="w-full p-4 rounded-2xl outline-none text-sm bg-[#1a2233]">
            <input id="auth-pass" type="password" placeholder="Senha" class="w-full p-4 rounded-2xl outline-none text-sm bg-[#1a2233]">
            <button id="auth-btn" class="w-full btn-gradient py-4 rounded-2xl font-black text-xs uppercase shadow-xl">Acessar</button>
            <button id="auth-link-btn" class="w-full text-gray-600 text-[9px] font-bold uppercase tracking-widest pt-2">Criar nova conta</button>
        </div>
    </div>

    <div id="onboarding-overlay" class="hidden fixed inset-0 z-[250] bg-black flex items-center justify-center p-6">
        <div class="card w-full max-w-sm p-8 rounded-[2.5rem] border-red-500/20 border">
            <h2 class="text-2xl font-black italic uppercase mb-2">Primeiros Passos</h2>
            <div class="space-y-4">
                <input id="on-name" type="text" placeholder="Nome" class="w-full p-4 rounded-2xl outline-none text-sm bg-[#1a2233]">
                <input id="on-weight" type="number" placeholder="Peso (kg)" class="w-full p-4 rounded-2xl outline-none text-sm bg-[#1a2233]">
                <select id="on-goal" class="w-full p-4 rounded-2xl outline-none text-sm bg-[#1a2233]">
                    <option value="gain">Ganho de Massa</option>
                    <option value="lose">Definição</option>
                </select>
                <button id="btn-finish-onboarding" class="w-full btn-gradient py-4 rounded-2xl font-black text-xs uppercase">Salvar Perfil</button>
            </div>
        </div>
    </div>

    <div id="exercise-modal" class="hidden fixed inset-0 z-[400] modal flex items-end justify-center">
        <div class="bg-[#121826] w-full max-w-md rounded-t-[3rem] p-8 border-t border-white/10 animate-slide-up">
            <div class="w-12 h-1.5 bg-gray-800 rounded-full mx-auto mb-6"></div>
            <h3 id="ex-modal-title" class="text-2xl font-black italic uppercase text-red-500 mb-2">Supino Reto</h3>
            <div class="flex gap-2 mb-6" id="ex-modal-tags">
                <span class="bg-red-500/10 text-red-500 text-[9px] px-3 py-1 rounded-full font-bold uppercase">Peito</span>
                <span class="bg-gray-800 text-gray-400 text-[9px] px-3 py-1 rounded-full font-bold uppercase">Tríceps</span>
            </div>
            <div class="space-y-4">
                <div class="card p-4 rounded-2xl border-white/5">
                    <p class="text-[10px] font-bold text-gray-500 uppercase mb-2">Dica de Execução</p>
                    <p id="ex-modal-tip" class="text-xs text-gray-300 leading-relaxed">Mantenha as escápulas contraídas e os pés firmes no chão.</p>
                </div>
                <button onclick="document.getElementById('exercise-modal').classList.add('hidden')" class="w-full py-4 bg-gray-800 rounded-2xl font-black text-[10px] uppercase">Fechar Detalhes</button>
            </div>
        </div>
    </div>

    <div id="main-app" class="hidden min-h-screen flex flex-col max-w-md mx-auto">
        <main class="flex-1 pb-32 pt-8 px-6 overflow-y-auto">
            
            <section id="tab-home" class="tab-content active">
                <h2 class="text-3xl font-black italic uppercase mb-6">Status <span class="text-red-500">Geral</span></h2>
                
                <div class="grid grid-cols-2 gap-4 mb-6">
                    <div class="card p-5 rounded-[2rem]">
                        <p class="text-[9px] font-black text-gray-500 uppercase">Frequência</p>
                        <p class="text-xl font-black italic text-red-500" id="dash-freq">0 Treinos</p>
                    </div>
                    <div class="card p-5 rounded-[2rem]">
                        <p class="text-[9px] font-black text-gray-500 uppercase">Volume Semanal</p>
                        <p class="text-xl font-black italic text-red-500" id="dash-volume">--</p>
                    </div>
                </div>

                <div class="card p-6 rounded-[2.5rem] mb-6">
                    <p class="text-[10px] font-black text-gray-500 uppercase mb-4">Evolução de Peso</p>
                    <canvas id="weight-chart" height="150"></canvas>
                </div>

                <div class="card p-6 rounded-[2.5rem]">
                    <p class="text-[10px] font-black text-gray-500 uppercase mb-4">Consistência (Últimos 7 dias)</p>
                    <canvas id="freq-chart" height="150"></canvas>
                </div>
            </section>

            <section id="tab-workout" class="tab-content">
                <div class="flex justify-between items-end mb-6">
                    <h2 class="text-4xl font-black italic uppercase leading-none">Treino<br><span class="text-red-500">do Dia</span></h2>
                    <button id="btn-gen-workout" class="bg-white text-black w-14 h-14 rounded-2xl flex items-center justify-center shadow-xl">
                        <i class="fas fa-wand-magic-sparkles"></i>
                    </button>
                </div>

                <div class="mb-6 flex gap-2 overflow-x-auto pb-2 no-scrollbar">
                    <button class="focus-item active bg-[#1a2233] px-5 py-2 rounded-xl text-[10px] font-bold uppercase" data-focus="Peito e Tríceps">Peito</button>
                    <button class="focus-item bg-[#1a2233] px-5 py-2 rounded-xl text-[10px] font-bold uppercase" data-focus="Costas e Bíceps">Costas</button>
                    <button class="focus-item bg-[#1a2233] px-5 py-2 rounded-xl text-[10px] font-bold uppercase" data-focus="Pernas">Pernas</button>
                </div>

                <div id="active-workout-container" class="hidden mb-10">
                    <div class="card p-6 rounded-[2.2rem] border-2 border-red-500/30">
                        <h3 class="text-xl font-black italic uppercase mb-5" id="active-workout-title">...</h3>
                        <div class="space-y-3" id="active-workout-exercises"></div>
                    </div>
                </div>
                <div id="workout-list" class="space-y-4"></div>
            </section>

            <section id="tab-profile" class="tab-content">
                <h2 class="text-4xl font-black italic uppercase mb-8">Conta</h2>
                <div class="space-y-4">
                    <div class="card p-6 rounded-3xl space-y-4">
                        <p class="text-[10px] font-black text-gray-500 uppercase">Editar Dados</p>
                        <input id="p-name" type="text" placeholder="Nome" class="w-full p-4 rounded-xl bg-[#1a2233] text-sm outline-none">
                        <input id="p-weight" type="number" placeholder="Peso" class="w-full p-4 rounded-xl bg-[#1a2233] text-sm outline-none">
                        <select id="p-goal" class="w-full p-4 rounded-xl bg-[#1a2233] text-sm outline-none">
                            <option value="gain">Ganho de Massa</option>
                            <option value="lose">Definição</option>
                        </select>
                        <button id="btn-update-profile" class="w-full btn-gradient py-4 rounded-xl font-black text-xs uppercase">Salvar Alterações</button>
                    </div>
                    <button id="btn-logout" class="w-full py-6 text-red-500 text-[10px] font-black uppercase">Sair do Aplicativo</button>
                </div>
            </section>
        </main>

        <nav class="fixed bottom-0 w-full max-w-md bg-gray-950/90 backdrop-blur-xl border-t border-white/5 flex justify-around py-8 px-4 z-[100] rounded-t-[2.5rem]">
            <button id="nav-home" class="nav-btn active flex flex-col items-center flex-1">
                <i class="fas fa-home-alt text-lg mb-1"></i>
                <span class="text-[8px] font-black uppercase">Home</span>
            </button>
            <button id="nav-workout" class="nav-btn flex flex-col items-center flex-1">
                <i class="fas fa-dumbbell text-lg mb-1"></i>
                <span class="text-[8px] font-black uppercase">Treino</span>
            </button>
            <button id="nav-profile" class="nav-btn flex flex-col items-center flex-1">
                <i class="fas fa-user text-lg mb-1"></i>
                <span class="text-[8px] font-black uppercase">Conta</span>
            </button>
        </nav>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc, collection, onSnapshot, addDoc, query, orderBy, limit } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyB-OVW28besAOq2gi9b6Et9EqIajLS-uwY",
            authDomain: "fit-pro-985ac.firebaseapp.com",
            projectId: "fit-pro-985ac",
            storageBucket: "fit-pro-985ac.firebasestorage.app",
            messagingSenderId: "809428255492",
            appId: "1:809428255492:web:c59ee6687310b8a3004651"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const GROQ_API_KEY = "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";

        let currentUser = null;
        let userData = { profile: null, weights: [], workouts: [] };
        let charts = { weight: null, freq: null };

        const showToast = (msg) => {
            const t = document.getElementById('toast');
            t.innerText = msg; t.classList.remove('hidden');
            setTimeout(() => t.classList.add('hidden'), 3000);
        };

        // --- NAVEGAÇÃO ---
        const changeTab = (id) => {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.getElementById('tab-' + id).classList.add('active');
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('nav-' + id).classList.add('active');
        };

        document.getElementById('nav-home').onclick = () => changeTab('home');
        document.getElementById('nav-workout').onclick = () => changeTab('workout');
        document.getElementById('nav-profile').onclick = () => changeTab('profile');

        // --- AUTH ---
        document.getElementById('auth-btn').onclick = async () => {
            const email = document.getElementById('auth-email').value;
            const pass = document.getElementById('auth-pass').value;
            try {
                if (document.getElementById('auth-mode').value === 'register') await createUserWithEmailAndPassword(auth, email, pass);
                else await signInWithEmailAndPassword(auth, email, pass);
            } catch (err) { showToast(err.message); }
        };

        onAuthStateChanged(auth, async (user) => {
            currentUser = user;
            if (user) {
                document.getElementById('login-screen').classList.add('hidden');
                document.getElementById('main-app').classList.remove('hidden');
                const docSnap = await getDoc(doc(db, 'users', user.uid, 'settings', 'profile'));
                if (!docSnap.exists()) document.getElementById('onboarding-overlay').classList.remove('hidden');
                else { userData.profile = docSnap.data(); startSync(user.uid); }
            } else {
                document.getElementById('login-screen').classList.remove('hidden');
                document.getElementById('main-app').classList.add('hidden');
            }
        });

        document.getElementById('btn-finish-onboarding').onclick = async () => {
            const p = { name: document.getElementById('on-name').value, weight: parseFloat(document.getElementById('on-weight').value), goal: document.getElementById('on-goal').value };
            await setDoc(doc(db, 'users', currentUser.uid, 'settings', 'profile'), p);
            document.getElementById('onboarding-overlay').classList.add('hidden');
            startSync(currentUser.uid);
        };

        // --- DATA SYNC ---
        function startSync(uid) {
            onSnapshot(doc(db, 'users', uid, 'settings', 'profile'), s => { 
                if(s.exists()){
                    userData.profile = s.data();
                    document.getElementById('p-name').value = userData.profile.name;
                    document.getElementById('p-weight').value = userData.profile.weight;
                    document.getElementById('p-goal').value = userData.profile.goal;
                }
            });
            onSnapshot(query(collection(db, 'users', uid, 'weights'), orderBy('date', 'asc')), s => {
                userData.weights = s.docs.map(d => d.data());
                renderWeightChart();
            });
            onSnapshot(query(collection(db, 'users', uid, 'workouts'), orderBy('date', 'desc')), s => {
                userData.workouts = s.docs.map(d => d.data());
                if(userData.workouts.length > 0) renderActiveWorkout(userData.workouts[0]);
                renderFreqChart();
            });
        }

        // --- CHARTS ---
        function renderWeightChart() {
            const ctx = document.getElementById('weight-chart');
            if(charts.weight) charts.weight.destroy();
            charts.weight = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: userData.weights.slice(-5).map(w => new Date(w.date).toLocaleDateString('pt-BR', {day:'2-digit'})),
                    datasets: [{ data: userData.weights.slice(-5).map(w => w.weight), borderColor: '#ef4444', tension: 0.4 }]
                },
                options: { plugins: { legend: { display: false } }, scales: { y: { display: false }, x: { grid: { display: false } } } }
            });
        }

        function renderFreqChart() {
            const ctx = document.getElementById('freq-chart');
            document.getElementById('dash-freq').innerText = userData.workouts.length + " Treinos";
            if(charts.freq) charts.freq.destroy();
            charts.freq = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: ['S', 'T', 'Q', 'Q', 'S', 'S', 'D'],
                    datasets: [{ data: [1, 0, 1, 1, 0, 1, 0], backgroundColor: '#ef4444', borderRadius: 5 }]
                },
                options: { plugins: { legend: { display: false } }, scales: { y: { display: false }, x: { grid: { display: false } } } }
            });
        }

        // --- WORKOUT LOGIC ---
        function openExDetails(exName) {
            document.getElementById('ex-modal-title').innerText = exName.split('-')[0];
            const modal = document.getElementById('exercise-modal');
            const prompt = `Dê uma dica curta técnica e quais músculos o exercício ${exName} trabalha. Responda JSON: {"tip": "...", "muscles": ["Peito", "..."]}`;
            
            fetch(`https://api.groq.com/openai/v1/chat/completions`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${GROQ_API_KEY}` },
                body: JSON.stringify({ model: "llama-3.1-8b-instant", messages: [{ role: "user", content: prompt }], response_format: { type: "json_object" } })
            }).then(r => r.json()).then(data => {
                const info = JSON.parse(data.choices[0].message.content);
                document.getElementById('ex-modal-tip').innerText = info.tip;
                document.getElementById('ex-modal-tags').innerHTML = info.muscles.map(m => `<span class="bg-red-500/10 text-red-500 text-[9px] px-3 py-1 rounded-full font-bold uppercase">${m}</span>`).join('');
                modal.classList.remove('hidden');
            });
        }

        function renderActiveWorkout(w) {
            document.getElementById('active-workout-container').classList.remove('hidden');
            document.getElementById('active-workout-title').innerText = w.title;
            document.getElementById('active-workout-exercises').innerHTML = w.exercises.map(ex => `
                <div class="flex items-center gap-3 p-4 bg-[#1a2233] rounded-2xl">
                    <input type="checkbox" class="workout-checkbox w-5 h-5 rounded-full border-gray-700 text-red-600 bg-gray-800">
                    <span class="flex-1 text-xs font-bold text-gray-200">${ex}</span>
                    <button onclick="window.openExDetails('${ex}')" class="text-gray-500 hover:text-red-500"><i class="fas fa-circle-info text-lg"></i></button>
                </div>
            `).join('');
        }

        window.openExDetails = openExDetails;

        document.getElementById('btn-gen-workout').onclick = async () => {
            const btn = document.getElementById('btn-gen-workout');
            const focus = document.querySelector('.focus-item.active').dataset.focus;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i>';
            const prompt = `Gere um treino de ${focus} para ${userData.profile.goal}. JSON: {"title": "...", "exercises": ["Ex - Séries/Reps"]}`;
            try {
                const res = await fetch(`https://api.groq.com/openai/v1/chat/completions`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${GROQ_API_KEY}` },
                    body: JSON.stringify({ model: "llama-3.1-8b-instant", messages: [{ role: "user", content: prompt }], response_format: { type: "json_object" } })
                });
                const workout = JSON.parse((await res.json()).choices[0].message.content);
                await addDoc(collection(db, 'users', currentUser.uid, 'workouts'), { ...workout, date: new Date().toISOString() });
            } catch (e) { showToast("Erro na geração."); }
            btn.innerHTML = '<i class="fas fa-wand-magic-sparkles"></i>';
        };

        document.getElementById('btn-update-profile').onclick = async () => {
            const p = { name: document.getElementById('p-name').value, weight: parseFloat(document.getElementById('p-weight').value), goal: document.getElementById('p-goal').value };
            await setDoc(doc(db, 'users', currentUser.uid, 'settings', 'profile'), p);
            showToast("Perfil atualizado!");
        };

        document.querySelectorAll('.focus-item').forEach(b => b.onclick = () => {
            document.querySelectorAll('.focus-item').forEach(x => x.classList.remove('active', 'bg-red-600'));
            b.classList.add('active', 'bg-red-600');
        });

        document.getElementById('btn-logout').onclick = () => signOut(auth);
    </script>
</body>
</html>
