<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#070b14">
    <title>FitPro Max AI | Elite Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">

    <style>
        :root { --bg: #070b14; --card: #131927; --accent: #ff3838; }
        body { background: var(--bg); color: #fff; font-family: 'Plus Jakarta Sans', sans-serif; -webkit-font-smoothing: antialiased; }
        .premium-card { background: linear-gradient(145deg, #1a2233 0%, #131927 100%); border: 1px solid rgba(255,255,255,0.06); }
        .tab-content { display: none; }
        .tab-content.active { display: block; animation: slideUp 0.4s ease; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .nav-btn.active { color: var(--accent); }
        .btn-premium { background: linear-gradient(90deg, #ff3838 0%, #ff6b6b 100%); }
        .workout-checkbox:checked + span { text-decoration: line-through; opacity: 0.4; }
        .glass { backdrop-filter: blur(12px); background: rgba(19, 25, 39, 0.85); }
    </style>
</head>
<body>

    <div id="toast" class="hidden fixed top-8 left-1/2 -translate-x-1/2 glass text-white px-8 py-4 rounded-3xl z-[500] shadow-2xl font-bold text-xs border border-white/10"></div>

    <div id="onboarding-overlay" class="hidden fixed inset-0 z-[250] bg-black flex items-center justify-center p-6">
        <div class="card w-full max-w-sm p-8 rounded-[3rem] premium-card">
            <h2 class="text-2xl font-black italic uppercase mb-2">Sua Jornada</h2>
            <p class="text-gray-400 text-[10px] uppercase font-bold mb-6">Defina seu nível de atleta</p>
            <div class="space-y-4">
                <input id="on-name" type="text" placeholder="Nome" class="w-full p-4 rounded-2xl bg-[#0a0f1a] border border-white/10 outline-none text-sm">
                <select id="on-level" class="w-full p-4 rounded-2xl bg-[#0a0f1a] border border-white/10 outline-none text-sm">
                    <option value="beginner">Iniciante (Começando agora)</option>
                    <option value="intermediate">Intermediário (Treino há 1 ano)</option>
                    <option value="pro">Pro (Treino Pesado)</option>
                </select>
                <select id="on-goal" class="w-full p-4 rounded-2xl bg-[#0a0f1a] border border-white/10 outline-none text-sm">
                    <option value="gain">Ganho de Massa</option>
                    <option value="lose">Emagrecimento</option>
                </select>
                <button id="btn-finish-onboarding" class="w-full btn-premium py-5 rounded-2xl font-black text-xs uppercase shadow-xl">Configurar meu App</button>
            </div>
        </div>
    </div>

    <div id="main-app" class="min-h-screen flex flex-col max-w-lg mx-auto">
        
        <header class="pt-10 px-8 flex justify-between items-center mb-6">
            <div>
                <h2 class="text-2xl font-black italic uppercase">FITPRO <span class="text-red-500">MAX</span></h2>
                <p id="user-level-tag" class="text-[9px] font-bold text-gray-500 uppercase tracking-widest">Nível: Carregando...</p>
            </div>
        </header>

        <main class="flex-1 pb-32 px-8 overflow-y-auto">
            
            <section id="tab-workout" class="tab-content active">
                <div class="flex justify-between items-center mb-6">
                    <h2 class="text-3xl font-black italic uppercase">Treino</h2>
                    <div class="flex gap-2">
                        <button id="btn-custom-workout" class="w-12 h-12 glass rounded-2xl flex items-center justify-center text-gray-400"><i class="fas fa-plus"></i></button>
                        <button id="btn-gen-workout" class="w-12 h-12 btn-premium rounded-2xl flex items-center justify-center"><i class="fas fa-wand-sparkles"></i></button>
                    </div>
                </div>

                <div id="ready-plans" class="flex gap-3 overflow-x-auto no-scrollbar mb-8">
                    </div>

                <div id="active-workout-container" class="hidden">
                    <div class="premium-card p-6 rounded-[2.5rem] border-red-500/20">
                        <h3 class="text-lg font-black italic uppercase mb-6 flex justify-between" id="active-workout-title">
                            Rotina Ativa
                        </h3>
                        <div class="space-y-4" id="active-workout-exercises"></div>
                    </div>
                </div>
            </section>

            <section id="tab-profile" class="tab-content">
                <h2 class="text-3xl font-black italic uppercase mb-8">Conta</h2>
                <div class="premium-card p-6 rounded-3xl space-y-4">
                    <button id="btn-reset-data" class="w-full p-4 rounded-xl bg-red-500/10 text-red-500 text-[10px] font-bold uppercase">Resetar Dados</button>
                    <button id="btn-logout" class="w-full p-4 text-gray-500 text-[10px] font-bold uppercase">Sair</button>
                </div>
            </section>
        </main>

        <nav class="fixed bottom-8 left-8 right-8 glass rounded-[2.5rem] border border-white/10 flex justify-around py-5 px-4 z-[300]">
            <button id="nav-workout" class="nav-btn active flex flex-col items-center flex-1"><i class="fas fa-dumbbell mb-1"></i><span class="text-[8px] font-bold uppercase">Treinar</span></button>
            <button id="nav-profile" class="nav-btn flex flex-col items-center flex-1"><i class="fas fa-user mb-1"></i><span class="text-[8px] font-bold uppercase">Perfil</span></button>
        </nav>
    </div>

    <div id="exercise-modal" class="hidden fixed inset-0 z-[500] glass flex items-end justify-center">
        <div class="bg-[#0a0f1a] w-full max-w-lg rounded-t-[3.5rem] p-10 border-t border-white/10 animate-slideUp">
            <div class="w-16 h-1.5 bg-gray-800 rounded-full mx-auto mb-8"></div>
            <h3 id="ex-modal-title" class="text-2xl font-black italic uppercase mb-4 text-red-500">Execução</h3>
            <div id="ex-modal-tags" class="flex gap-2 mb-6"></div>
            <div class="premium-card p-6 rounded-3xl mb-6">
                <p class="text-[10px] font-black text-gray-500 uppercase mb-2">Instrução Técnica</p>
                <p id="ex-modal-tip" class="text-sm text-gray-300 leading-relaxed font-medium">Carregando dicas da IA...</p>
            </div>
            <button onclick="document.getElementById('exercise-modal').classList.add('hidden')" class="w-full py-5 btn-premium rounded-2xl font-black text-xs uppercase">Concluído</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-app.js";
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc, collection, onSnapshot, addDoc, query, orderBy } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyB-OVW28besAOq2gi9b6Et9EqIajLS-uwY", // TROQUE SE DER ERRO DE CHAVE
            authDomain: "fit-pro-985ac.firebaseapp.com",
            projectId: "fit-pro-985ac",
            storageBucket: "fit-pro-985ac.firebasestorage.app",
            messagingSenderId: "809428255492",
            appId: "1:809428255492:web:c59ee6687310b8a3004651"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const GROQ_API_KEY = "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";

        let currentUser = null;
        let userData = { profile: null };

        const showToast = (msg) => {
            const t = document.getElementById('toast');
            t.innerText = msg; t.classList.remove('hidden');
            setTimeout(() => t.classList.add('hidden'), 3000);
        };

        // ROTINAS PRONTAS POR NÍVEL
        const stockWorkouts = {
            beginner: [
                { title: "Adaptação A", exercises: ["Supino Máquina - 3x12", "Puxada Frente - 3x12", "Leg Press - 3x15", "Rosca Halter - 3x12"] },
                { title: "Full Body Light", exercises: ["Agachamento Livre - 3x10", "Desenvolvimento Halter - 3x12", "Remada Baixa - 3x12"] }
            ],
            pro: [
                { title: "Elite Push Day", exercises: ["Supino Inclinado 45º - 4x8", "Cross Over - 4x12", "Tríceps Corda - 4x15", "Elevação Lateral - 5x10"] },
                { title: "Leg Day Brutal", exercises: ["Agachamento Sumô - 4x10", "Extensora - 4x Falha", "Stiff - 4x12", "Leg 45º - 3x20"] }
            ]
        };

        onAuthStateChanged(auth, async (user) => {
            currentUser = user;
            if (user) {
                const docSnap = await getDoc(doc(db, 'users', user.uid, 'settings', 'profile'));
                if (!docSnap.exists()) document.getElementById('onboarding-overlay').classList.remove('hidden');
                else { 
                    userData.profile = docSnap.data();
                    renderApp();
                }
            }
        });

        document.getElementById('btn-finish-onboarding').onclick = async () => {
            const p = { 
                name: document.getElementById('on-name').value, 
                level: document.getElementById('on-level').value, 
                goal: document.getElementById('on-goal').value 
            };
            await setDoc(doc(db, 'users', currentUser.uid, 'settings', 'profile'), p);
            location.reload();
        };

        function renderApp() {
            document.getElementById('user-level-tag').innerText = `Nível: ${userData.profile.level}`;
            const plans = stockWorkouts[userData.profile.level] || stockWorkouts.beginner;
            
            document.getElementById('ready-plans').innerHTML = plans.map(p => `
                <button onclick="window.loadWorkout('${p.title}')" class="glass px-6 py-4 rounded-3xl text-xs font-bold whitespace-nowrap border border-white/5">
                    <i class="fas fa-play text-red-500 mr-2"></i> ${p.title}
                </button>
            `).join('');

            // Escuta treinos ativos
            onSnapshot(query(collection(db, 'users', currentUser.uid, 'workouts'), orderBy('date', 'desc')), s => {
                const list = s.docs.map(d => d.data());
                if(list.length > 0) renderWorkout(list[0]);
            });
        }

        window.loadWorkout = async (title) => {
            const plans = stockWorkouts[userData.profile.level] || stockWorkouts.beginner;
            const workout = plans.find(p => p.title === title);
            await addDoc(collection(db, 'users', currentUser.uid, 'workouts'), { ...workout, date: new Date().toISOString() });
            showToast("Plano carregado!");
        };

        function renderWorkout(w) {
            document.getElementById('active-workout-container').classList.remove('hidden');
            document.getElementById('active-workout-title').innerText = w.title;
            // CORREÇÃO DO [OBJECT OBJECT]: Verificamos se 'ex' é string
            document.getElementById('active-workout-exercises').innerHTML = w.exercises.map(ex => {
                const name = typeof ex === 'string' ? ex : ex.name || "Exercício";
                return `
                <div class="flex items-center gap-4 p-5 glass rounded-3xl border border-white/5">
                    <input type="checkbox" class="workout-checkbox w-6 h-6 rounded-full border-gray-700 bg-gray-800 text-red-600 focus:ring-0">
                    <span class="flex-1 text-sm font-bold text-gray-200">${name}</span>
                    <button onclick="window.showDetails('${name}')" class="w-10 h-10 flex items-center justify-center rounded-xl bg-white/5 text-gray-400">
                        <i class="fas fa-info text-xs"></i>
                    </button>
                </div>
            `}).join('');
        }

        window.showDetails = async (name) => {
            const modal = document.getElementById('exercise-modal');
            document.getElementById('ex-modal-title').innerText = name;
            document.getElementById('ex-modal-tip').innerText = "Analisando biomecânica...";
            modal.classList.remove('hidden');

            const prompt = `Como um Personal Expert, dê uma dica técnica curta e rápida para o exercício: ${name}. Responda apenas um JSON com "tip" e "muscles" (array).`;
            
            try {
                const res = await fetch(`https://api.groq.com/openai/v1/chat/completions`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${GROQ_API_KEY}` },
                    body: JSON.stringify({ model: "llama-3.1-8b-instant", messages: [{role:"user", content:prompt}], response_format: {type:"json_object"} })
                });
                const data = JSON.parse((await res.json()).choices[0].message.content);
                document.getElementById('ex-modal-tip').innerText = data.tip;
                document.getElementById('ex-modal-tags').innerHTML = data.muscles.map(m => `<span class="bg-red-500/10 text-red-500 text-[8px] px-3 py-1 rounded-full font-black uppercase">${m}</span>`).join('');
            } catch(e) { document.getElementById('ex-modal-tip').innerText = "Mantenha a postura e contração lenta."; }
        };

        // CRIAR PRÓPRIA ROTINA (CUSTOM)
        document.getElementById('btn-custom-workout').onclick = async () => {
            const name = prompt("Nome da sua nova rotina:");
            if(!name) return;
            const exercises = prompt("Liste os exercícios separados por vírgula (Ex: Supino, Puxada):");
            if(!exercises) return;
            
            const newWorkout = {
                title: name,
                exercises: exercises.split(',').map(e => e.trim()),
                date: new Date().toISOString()
            };
            await addDoc(collection(db, 'users', currentUser.uid, 'workouts'), newWorkout);
            showToast("Rotina criada com sucesso!");
        };

        document.getElementById('btn-logout').onclick = () => signOut(auth);
        document.getElementById('btn-reset-data').onclick = () => { if(confirm("Apagar tudo?")) location.reload(); };

    </script>
</body>
</html>
