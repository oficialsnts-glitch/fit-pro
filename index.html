<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#0a0f1a">
    <title>FitPro Max Cloud AI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root { --bg: #070b14; --card: #121826; --accent: #ef4444; }
        body { background: var(--bg); color: #fff; font-family: 'Inter', sans-serif; -webkit-font-smoothing: antialiased; overflow-x: hidden; }
        .card { background: var(--card); border: 1px solid rgba(255,255,255,0.05); }
        .tab-content { display: none; }
        .tab-content.active { display: block; animation: fadeIn 0.4s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .nav-btn.active { color: var(--accent); }
        .focus-btn { background: #1a2233; border: 1px solid transparent; transition: 0.2s; cursor: pointer; }
        .focus-btn.active { border-color: var(--accent); background: rgba(239, 68, 68, 0.1); color: var(--accent); }
        input, select { background: #1a2233 !important; border: 1px solid rgba(255,255,255,0.05) !important; color: white !important; }
        .btn-gradient { background: linear-gradient(135deg, #ef4444, #991b1b); }
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body>

    <div id="toast" class="hidden fixed top-6 left-1/2 -translate-x-1/2 bg-red-600 text-white px-8 py-3 rounded-full z-[200] shadow-2xl font-bold text-xs uppercase text-center min-w-[200px]"></div>

    <div id="login-screen" class="fixed inset-0 z-[100] bg-[#070b14] flex flex-col items-center justify-center p-10 text-center">
        <div class="w-16 h-16 bg-red-600 rounded-2xl flex items-center justify-center mb-6 shadow-2xl rotate-3">
            <i class="fas fa-bolt text-3xl"></i>
        </div>
        <h1 id="auth-title" class="text-3xl font-black italic mb-1 uppercase tracking-tighter">Entrar</h1>
        <p class="text-gray-500 text-[10px] font-bold uppercase tracking-[0.2em] mb-10">FitPro Max AI</p>
        
        <div class="w-full max-w-xs space-y-4">
            <input type="hidden" id="auth-mode" value="login">
            <input id="auth-email" type="email" placeholder="Email" class="w-full p-4 rounded-2xl outline-none text-sm">
            
            <div class="relative">
                <input id="auth-pass" type="password" placeholder="Senha" class="w-full p-4 rounded-2xl outline-none text-sm pr-12">
                <button type="button" id="toggle-pass-btn" class="absolute right-4 top-1/2 -translate-y-1/2 text-gray-500">
                    <i id="toggle-pass-icon" class="fas fa-eye"></i>
                </button>
            </div>
            
            <button id="auth-btn" class="w-full btn-gradient py-4 rounded-2xl font-black text-xs uppercase shadow-xl active:scale-95 transition-transform">Acessar</button>
            <button id="auth-link-btn" class="w-full text-gray-600 text-[9px] font-bold uppercase tracking-widest pt-2">Criar nova conta</button>
        </div>
    </div>

    <div id="main-app" class="hidden min-h-screen flex flex-col max-w-md mx-auto relative">
        <main class="flex-1 pb-32 pt-8 px-6 overflow-y-auto">
            
            <section id="tab-home" class="tab-content active">
                <div class="flex justify-between items-center mb-8">
                    <div>
                        <p class="text-[10px] font-black text-red-500 uppercase tracking-widest mb-1">Status de Hoje</p>
                        <h2 class="text-3xl font-black italic uppercase leading-none"><span id="dash-name">Atleta</span></h2>
                    </div>
                    <button class="w-12 h-12 rounded-2xl bg-gray-800/50 border border-white/5 flex items-center justify-center">
                        <i class="fas fa-bell text-gray-500"></i>
                    </button>
                </div>

                <div class="grid grid-cols-2 gap-4 mb-8">
                    <div class="card p-5 rounded-[2rem]">
                        <div class="flex items-center gap-3 mb-4">
                            <div class="w-8 h-8 rounded-xl bg-blue-500/10 flex items-center justify-center text-blue-500 text-xs">
                                <i class="fas fa-weight-hanging"></i>
                            </div>
                            <span class="text-[9px] font-black text-gray-500 uppercase tracking-widest">Peso</span>
                        </div>
                        <p class="text-2xl font-black"><span id="dash-weight">--</span> <span class="text-[10px] text-gray-600 font-normal">KG</span></p>
                    </div>
                    <div class="card p-5 rounded-[2rem]">
                        <div class="flex items-center gap-3 mb-4">
                            <div class="w-8 h-8 rounded-xl bg-orange-500/10 flex items-center justify-center text-orange-500 text-xs">
                                <i class="fas fa-fire"></i>
                            </div>
                            <span class="text-[9px] font-black text-gray-500 uppercase tracking-widest">Meta</span>
                        </div>
                        <p class="text-2xl font-black"><span id="dash-kcal">--</span> <span class="text-[10px] text-gray-600 font-normal">KCAL</span></p>
                    </div>
                </div>

                <div class="mb-8">
                    <h4 class="text-[10px] font-black text-gray-600 uppercase tracking-widest mb-4">Foco do Dia</h4>
                    <div class="flex gap-3 overflow-x-auto pb-2 no-scrollbar" id="focus-container">
                        <button class="focus-btn focus-item active px-6 py-3 rounded-2xl text-[10px] font-black uppercase whitespace-nowrap" data-focus="Peito">Peito</button>
                        <button class="focus-btn focus-item px-6 py-3 rounded-2xl text-[10px] font-black uppercase whitespace-nowrap" data-focus="Costas">Costas</button>
                        <button class="focus-btn focus-item px-6 py-3 rounded-2xl text-[10px] font-black uppercase whitespace-nowrap" data-focus="Pernas">Pernas</button>
                        <button class="focus-btn focus-item px-6 py-3 rounded-2xl text-[10px] font-black uppercase whitespace-nowrap" data-focus="Cardio">Cardio</button>
                    </div>
                </div>

                <div class="card p-6 rounded-[2.5rem] relative overflow-hidden">
                    <div class="flex justify-between items-center mb-6">
                        <h4 class="text-[10px] font-black text-gray-500 uppercase tracking-widest">Progresso</h4>
                        <i class="fas fa-chart-line text-gray-700"></i>
                    </div>
                    <canvas id="weight-chart" height="150"></canvas>
                </div>
            </section>

            <section id="tab-workout" class="tab-content">
                <div class="flex justify-between items-end mb-10">
                    <h2 class="text-4xl font-black italic uppercase leading-none">Meus<br><span class="text-red-500">Planos</span></h2>
                    <button id="btn-gen-workout" class="bg-white text-black w-14 h-14 rounded-2xl flex items-center justify-center shadow-xl active:scale-90 transition-transform">
                        <i class="fas fa-wand-magic-sparkles"></i>
                    </button>
                </div>
                <div id="workout-list" class="space-y-4"></div>
            </section>

            <section id="tab-profile" class="tab-content">
                <h2 class="text-4xl font-black italic uppercase mb-10">Meu<br><span class="text-red-500">Perfil</span></h2>
                <div class="space-y-5">
                    <input id="p-name" type="text" placeholder="Nome" class="w-full p-5 rounded-2xl outline-none text-sm font-bold">
                    <div class="grid grid-cols-2 gap-4">
                        <input id="p-weight" type="number" placeholder="Peso (kg)" class="w-full p-5 rounded-2xl outline-none text-sm font-bold">
                        <input id="p-height" type="number" placeholder="Altura (cm)" class="w-full p-5 rounded-2xl outline-none text-sm font-bold">
                    </div>
                    <select id="p-goal" class="w-full p-5 rounded-2xl outline-none text-sm font-bold appearance-none">
                        <option value="gain">Ganho de Massa</option>
                        <option value="lose">Definição</option>
                        <option value="maintain">Manutenção</option>
                    </select>
                    <input id="p-age" type="number" placeholder="Idade" class="w-full p-5 rounded-2xl outline-none text-sm font-bold">
                    <button id="btn-save-profile" class="w-full btn-gradient py-5 rounded-3xl font-black text-xs uppercase shadow-2xl active:scale-95 transition-transform">Salvar Dados</button>
                    
                    <div class="pt-10 border-t border-white/5">
                        <h4 class="text-[10px] font-black text-gray-600 uppercase tracking-widest mb-4">Registrar Peso</h4>
                        <div class="flex gap-3">
                            <input id="new-weight-val" type="number" step="0.1" placeholder="00.0" class="flex-1 p-5 rounded-2xl outline-none text-sm font-bold">
                            <button id="btn-add-weight" class="bg-white text-black w-16 rounded-2xl flex items-center justify-center font-black"><i class="fas fa-check"></i></button>
                        </div>
                    </div>
                    <button id="btn-logout" class="w-full py-6 text-gray-700 text-[9px] font-black uppercase tracking-[0.3em]">Logout</button>
                </div>
            </section>
        </main>

        <nav class="fixed bottom-0 w-full max-w-md bg-gray-950/80 backdrop-blur-2xl border-t border-white/5 flex justify-around py-8 px-4 z-50 rounded-t-[3rem]">
            <button id="nav-home" class="nav-btn active flex flex-col items-center flex-1">
                <i class="fas fa-home-alt text-lg mb-1"></i>
                <span class="text-[8px] font-black uppercase tracking-widest">Dash</span>
            </button>
            <button id="nav-workout" class="nav-btn flex flex-col items-center flex-1">
                <i class="fas fa-dumbbell text-lg mb-1"></i>
                <span class="text-[8px] font-black uppercase tracking-widest">Treino</span>
            </button>
            <button id="nav-profile" class="nav-btn flex flex-col items-center flex-1">
                <i class="fas fa-user text-lg mb-1"></i>
                <span class="text-[8px] font-black uppercase tracking-widest">Conta</span>
            </button>
        </nav>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, collection, onSnapshot, addDoc, query, orderBy, limit } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-firestore.js";

        // CONFIGURAÇÕES (Substitua pelos seus dados reais do Firebase)
        const firebaseConfig = {
            apiKey: "SUA_API_KEY",
            authDomain: "SEU_PROJETO.firebaseapp.com",
            projectId: "SEU_PROJETO",
            storageBucket: "SEU_PROJETO.appspot.com",
            messagingSenderId: "ID",
            appId: "APP_ID"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const GEMINI_API_KEY = "SUA_CHAVE_GEMINI"; 

        let currentUser = null;
        let userData = { profile: { name: 'Atleta', weight: 0, goal: 'gain' }, weights: [], workouts: [] };
        let chart = null;

        // UI HELPERS
        const showToast = (msg) => {
            const t = document.getElementById('toast');
            t.innerText = msg; t.classList.remove('hidden');
            setTimeout(() => t.classList.add('hidden'), 3000);
        };

        const showTab = (id) => {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.getElementById('tab-' + id).classList.add('active');
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('nav-' + id).classList.add('active');
        };

        // AUTH LOGIC
        const handleAuth = async () => {
            const email = document.getElementById('auth-email').value;
            const pass = document.getElementById('auth-pass').value;
            const isRegister = document.getElementById('auth-mode').value === 'register';
            
            if(!email || !pass) return showToast("Preencha todos os campos");

            try {
                if (isRegister) {
                    await createUserWithEmailAndPassword(auth, email, pass);
                    showToast("Conta criada com sucesso!");
                } else {
                    await signInWithEmailAndPassword(auth, email, pass);
                }
            } catch (err) {
                showToast("Erro: " + err.message);
            }
        };

        // DATABASE SYNC
        onAuthStateChanged(auth, (user) => {
            currentUser = user;
            if (user) {
                document.getElementById('login-screen').classList.add('hidden');
                document.getElementById('main-app').classList.remove('hidden');
                setupSubscriptions(user.uid);
            } else {
                document.getElementById('login-screen').classList.remove('hidden');
                document.getElementById('main-app').classList.add('hidden');
            }
        });

        const setupSubscriptions = (uid) => {
            // Profile
            onSnapshot(doc(db, 'users', uid, 'data', 'profile'), (s) => {
                if (s.exists()) {
                    userData.profile = s.data();
                    updateUI();
                }
            });

            // Weights (pega os últimos 7 para o gráfico)
            const weightQuery = query(collection(db, 'users', uid, 'weights'), orderBy('date', 'asc'));
            onSnapshot(weightQuery, (s) => {
                userData.weights = s.docs.map(d => d.data());
                renderChart();
            });

            // Workouts
            onSnapshot(collection(db, 'users', uid, 'workouts'), (s) => {
                userData.workouts = s.docs.map(d => d.data()).sort((a,b) => new Date(b.date) - new Date(a.date));
                renderWorkouts();
            });
        };

        const updateUI = () => {
            const p = userData.profile;
            document.getElementById('dash-name').innerText = p.name || "Atleta";
            document.getElementById('dash-weight').innerText = p.weight || "--";
            
            const factor = p.goal === 'gain' ? 35 : (p.goal === 'lose' ? 24 : 30);
            const kcal = Math.round((p.weight || 70) * factor);
            document.getElementById('dash-kcal').innerText = kcal || "--";
            
            document.getElementById('p-name').value = p.name || "";
            document.getElementById('p-weight').value = p.weight || "";
            document.getElementById('p-height').value = p.height || "";
            document.getElementById('p-goal').value = p.goal || "gain";
            document.getElementById('p-age').value = p.age || "";
        };

        const renderChart = () => {
            const ctx = document.getElementById('weight-chart');
            if(!ctx || userData.weights.length < 2) return;

            const lastWeights = userData.weights.slice(-7);
            const labels = lastWeights.map(w => new Date(w.date).toLocaleDateString('pt-BR', {day: '2-digit', month: '2-digit'}));
            const data = lastWeights.map(w => w.weight);

            if(chart) chart.destroy();
            chart = new Chart(ctx, {
                type: 'line',
                data: { 
                    labels, 
                    datasets: [{ 
                        data, 
                        borderColor: '#ef4444', 
                        borderWidth: 3, 
                        tension: 0.4, 
                        fill: true, 
                        backgroundColor: 'rgba(239, 68, 68, 0.1)', 
                        pointRadius: 4,
                        pointBackgroundColor: '#ef4444'
                    }] 
                },
                options: { 
                    plugins: { legend: { display: false } }, 
                    scales: { 
                        y: { display: false }, 
                        x: { grid: { display: false }, ticks: { color: '#666', font: { size: 9 } } } 
                    } 
                }
            });
        };

        const renderWorkouts = () => {
            const list = document.getElementById('workout-list');
            if (userData.workouts.length === 0) {
                list.innerHTML = '<p class="text-center py-10 opacity-30 uppercase text-[10px] font-black">Nenhum treino gerado</p>';
                return;
            }
            list.innerHTML = userData.workouts.map(w => `
                <div class="card p-6 rounded-3xl">
                    <div class="flex justify-between items-start mb-4">
                        <h3 class="text-lg font-black italic uppercase text-red-500">${w.title}</h3>
                        <span class="text-[8px] text-gray-600">${new Date(w.date).toLocaleDateString()}</span>
                    </div>
                    <div class="space-y-3">
                        ${w.exercises.map(ex => `
                            <div class="flex items-center gap-3">
                                <div class="w-1.5 h-1.5 bg-red-600 rounded-full"></div>
                                <span class="text-xs text-gray-300 font-medium">${ex}</span>
                            </div>
                        `).join('')}
                    </div>
                </div>
            `).join('');
        };

        // EVENT LISTENERS
        document.getElementById('auth-btn').onclick = handleAuth;
        
        document.getElementById('auth-link-btn').onclick = () => {
            const mode = document.getElementById('auth-mode');
            const isLogin = mode.value === 'login';
            mode.value = isLogin ? 'register' : 'login';
            document.getElementById('auth-title').innerText = isLogin ? "Criar Conta" : "Entrar";
            document.getElementById('auth-btn').innerText = isLogin ? "Registrar" : "Acessar";
            document.getElementById('auth-link-btn').innerText = isLogin ? "Já tem conta? Entre" : "Criar nova conta";
        };

        document.getElementById('toggle-pass-btn').onclick = () => {
            const input = document.getElementById('auth-pass');
            const icon = document.getElementById('toggle-pass-icon');
            const isPass = input.type === 'password';
            input.type = isPass ? 'text' : 'password';
            icon.className = isPass ? 'fas fa-eye-slash' : 'fas fa-eye';
        };

        document.getElementById('btn-save-profile').onclick = async () => {
            const profile = {
                name: document.getElementById('p-name').value,
                weight: parseFloat(document.getElementById('p-weight').value),
                height: parseFloat(document.getElementById('p-height').value),
                goal: document.getElementById('p-goal').value,
                age: parseInt(document.getElementById('p-age').value)
            };
            await setDoc(doc(db, 'users', currentUser.uid, 'data', 'profile'), profile);
            showToast("Perfil atualizado!");
        };

        document.getElementById('btn-add-weight').onclick = async () => {
            const weight = parseFloat(document.getElementById('new-weight-val').value);
            if(!weight) return;
            await addDoc(collection(db, 'users', currentUser.uid, 'weights'), {
                weight,
                date: new Date().toISOString()
            });
            document.getElementById('new-weight-val').value = '';
            showToast("Peso registrado!");
        };

        document.getElementById('btn-logout').onclick = () => signOut(auth);

        document.getElementById('nav-home').onclick = () => showTab('home');
        document.getElementById('nav-workout').onclick = () => showTab('workout');
        document.getElementById('nav-profile').onclick = () => showTab('profile');

        document.querySelectorAll('.focus-item').forEach(btn => {
            btn.onclick = () => {
                document.querySelectorAll('.focus-item').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
            };
        });

        document.getElementById('btn-gen-workout').onclick = async () => {
            const btn = document.getElementById('btn-gen-workout');
            const focus = document.querySelector('.focus-item.active').dataset.focus;
            
            btn.disabled = true;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i>';

            const prompt = `Atue como um Personal Trainer. Crie um treino de ${focus} para um atleta com objetivo de ${userData.profile.goal}. 
            Retorne APENAS um JSON no formato: {"title": "Nome do Treino", "exercises": ["Exercício 1 - 3x12", "Exercício 2 - 4x10"]}`;

            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${GEMINI_API_KEY}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: prompt }] }],
                        generationConfig: { responseMimeType: "application/json" }
                    })
                });

                const data = await response.json();
                const content = JSON.parse(data.candidates[0].content.parts[0].text);
                
                await addDoc(collection(db, 'users', currentUser.uid, 'workouts'), {
                    ...content,
                    date: new Date().toISOString()
                });
                showToast("Novo treino gerado pela IA!");
            } catch (error) {
                console.error(error);
                showToast("Erro ao gerar treino");
            } finally {
                btn.disabled = false;
                btn.innerHTML = '<i class="fas fa-wand-magic-sparkles"></i>';
            }
        };
    </script>
</body>
</html>
