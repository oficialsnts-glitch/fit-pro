<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#111827">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>SDR - SHAPE DE RESPONSA</title>
<script src="https://cdn.tailwindcss.com"></script>

<!-- Firebase SDKs -->
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
  import { 
    getAuth, 
    onAuthStateChanged, 
    GoogleAuthProvider, 
    signInWithPopup, 
    signInWithEmailAndPassword,
    createUserWithEmailAndPassword,
    signOut
  } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
  import { getFirestore, doc, setDoc, getDoc, collection, onSnapshot } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyB-OVW28besAOq2gi9b6Et9EqIajLS-uwY",
    authDomain: "fit-pro-985ac.firebaseapp.com",
    databaseURL: "https://fit-pro-985ac-default-rtdb.firebaseio.com",
    projectId: "fit-pro-985ac",
    storageBucket: "fit-pro-985ac.firebasestorage.app",
    messagingSenderId: "809428255492",
    appId: "1:809428255492:web:c59ee6687310b8a3004651",
    measurementId: "G-MGSHX1712H"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getFirestore(app);
  const appId = typeof __app_id !== 'undefined' ? __app_id : 'fit-pro-985ac';

  window.fb = { 
    auth, db, appId, doc, setDoc, getDoc, collection, onSnapshot,
    GoogleAuthProvider, signInWithPopup, signInWithEmailAndPassword, createUserWithEmailAndPassword, signOut 
  };
</script>

<style>
  body { -webkit-tap-highlight-color: transparent; overscroll-behavior: none; background-color: #030712; color: white; font-family: sans-serif; }
  .slide-up { animation: slideUp 0.5s cubic-bezier(0.16, 1, 0.3, 1); }
  @keyframes slideUp { from { transform: translateY(30px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
  .btn-press:active { transform: scale(0.96); }
  input::-webkit-outer-spin-button, input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
  .brand-gradient { background: linear-gradient(135deg, #ef4444 0%, #991b1b 100%); }
</style>
</head>
<body class="select-none overflow-x-hidden">

<!-- TOAST -->
<div id="toast" class="hidden fixed top-6 left-1/2 -translate-x-1/2 bg-red-600 text-white px-6 py-3 rounded-2xl z-[20000] shadow-2xl slide-up text-sm font-bold uppercase tracking-tighter"></div>

<!-- AUTH SCREEN -->
<div id="auth-screen" class="fixed inset-0 bg-gray-950 flex items-center justify-center p-6 z-[10000] overflow-y-auto">
    <div class="w-full max-w-sm text-center slide-up py-10">
        <div class="mb-8">
            <div class="w-20 h-20 brand-gradient rounded-[30px] mx-auto flex items-center justify-center text-4xl mb-4 shadow-2xl shadow-red-900/40 border border-red-500/30">💀</div>
            <h1 class="text-3xl font-black italic uppercase tracking-tighter leading-none text-white">SDR<br><span class="text-red-500">SHAPE DE RESPONSA</span></h1>
            <p class="text-gray-500 mt-2 font-bold uppercase text-[9px] tracking-[0.2em]">Protocolo de Elite</p>
        </div>

        <div id="auth-forms" class="space-y-4 text-left">
            <!-- Google Login -->
            <button onclick="loginGoogle()" class="w-full bg-white text-black py-4 rounded-2xl font-bold flex items-center justify-center gap-3 btn-press shadow-lg mb-6">
                <svg class="w-5 h-5" viewBox="0 0 488 512"><path d="M488 261.8C488 403.3 391.1 504 248 504 110.8 504 0 393.2 0 256S110.8 8 248 8c66.8 0 123 24.5 166.3 64.9l-67.5 64.9C258.5 52.6 94.3 116.6 94.3 256c0 86.5 69.1 156.6 153.7 156.6 98.2 0 135-70.4 140.8-106.9H248v-85.3h236.1c2.3 12.7 3.9 24.9 3.9 41.4z"/></svg>
                Entrar com Google
            </button>

            <div class="flex items-center gap-4 my-4 opacity-30">
                <div class="h-[1px] bg-gray-600 flex-1"></div>
                <span class="text-[9px] font-black uppercase">ou e-mail</span>
                <div class="h-[1px] bg-gray-600 flex-1"></div>
            </div>

            <!-- Email Form -->
            <div class="space-y-3" id="login-container">
                <input id="auth-email" type="email" placeholder="Seu e-mail" class="w-full bg-gray-900 border border-gray-800 p-4 rounded-2xl text-sm outline-none focus:border-red-500 transition-all">
                <input id="auth-pass" type="password" placeholder="Sua senha" class="w-full bg-gray-900 border border-gray-800 p-4 rounded-2xl text-sm outline-none focus:border-red-500 transition-all">
                
                <div id="action-buttons" class="pt-2">
                    <button id="btn-main-action" onclick="handleEmailAuth()" class="w-full bg-red-600 py-4 rounded-2xl font-black uppercase tracking-widest text-sm btn-press shadow-lg shadow-red-900/20">Entrar</button>
                    <button id="btn-switch-auth" onclick="toggleAuthMode()" class="w-full mt-4 text-[10px] text-gray-500 font-bold uppercase tracking-widest text-center">Não tem conta? Criar agora</button>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- ONBOARDING -->
<div id="onboarding" class="hidden fixed inset-0 bg-gray-950 flex items-center justify-center p-6 z-[11000] overflow-y-auto">
    <div class="w-full max-w-sm slide-up">
        <div class="text-center mb-8">
            <h2 class="text-3xl font-black italic uppercase leading-none">CONFIGURAR<br><span class="text-red-500">BIOTIPO</span></h2>
        </div>
        <div class="space-y-4 bg-gray-900 p-8 rounded-[40px] border border-gray-800 shadow-2xl">
            <div>
                <label class="text-[9px] font-black text-gray-600 uppercase ml-2 tracking-widest">Nome ou Apelido</label>
                <input id="ob-name" type="text" placeholder="Como quer ser chamado?" class="w-full bg-gray-950 p-4 rounded-2xl border border-gray-800 outline-none focus:border-red-500 mt-1">
            </div>
            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="text-[9px] font-black text-gray-600 uppercase ml-2 tracking-widest">Altura (cm)</label>
                    <input id="ob-height" type="number" placeholder="180" class="w-full bg-gray-950 p-4 rounded-2xl border border-gray-800 outline-none focus:border-red-500 mt-1 font-mono">
                </div>
                <div>
                    <label class="text-[9px] font-black text-gray-600 uppercase ml-2 tracking-widest">Peso (kg)</label>
                    <input id="ob-weight" type="number" step="0.1" placeholder="85.5" class="w-full bg-gray-950 p-4 rounded-2xl border border-gray-800 outline-none focus:border-red-500 mt-1 font-mono">
                </div>
            </div>
            <button onclick="finishOnboarding()" class="w-full bg-red-600 py-5 rounded-2xl font-black uppercase tracking-[0.2em] text-xs btn-press shadow-xl shadow-red-900/30">GERAR SHAPE</button>
        </div>
    </div>
</div>

<!-- APP MAIN CONTENT -->
<main id="app-content" class="hidden pb-24 max-w-md mx-auto min-h-screen p-6">
    <header class="flex justify-between items-start mb-12">
        <div>
            <h1 class="text-2xl font-black italic uppercase leading-none text-white">SDR<br><span class="text-red-500">SHAPE</span></h1>
            <p id="userName" class="text-[9px] text-gray-600 font-black uppercase tracking-widest mt-1">Carregando...</p>
        </div>
        <button onclick="logout()" class="text-[9px] font-black text-red-500 bg-red-500/10 px-4 py-2 rounded-xl uppercase tracking-widest border border-red-500/20 btn-press">Sair</button>
    </header>

    <div class="space-y-6">
        <div class="bg-gray-900 border border-gray-800 p-8 rounded-[40px] relative overflow-hidden group">
            <div class="absolute top-0 right-0 p-4 text-4xl opacity-10 group-hover:scale-110 transition-transform">🔥</div>
            <div class="text-[9px] font-black text-gray-500 uppercase tracking-widest mb-2">Estado Atual</div>
            <h3 class="font-black text-2xl uppercase italic text-white">Protocolo Ativo</h3>
            <p class="text-gray-500 text-xs mt-2 leading-relaxed">Sincronizado com a base de dados <span class="text-red-500 font-bold">SDR CLOUD</span>.</p>
            <button class="w-full bg-red-600 mt-8 py-5 rounded-2xl font-black uppercase tracking-[0.2em] text-xs btn-press shadow-lg shadow-red-900/20">Iniciar Treino</button>
        </div>

        <div class="grid grid-cols-2 gap-4">
            <div class="bg-gray-900 border border-gray-800 p-6 rounded-[32px]">
                <div class="text-[9px] font-black text-gray-600 uppercase tracking-widest mb-1">Massa</div>
                <div class="text-2xl font-black italic text-white" id="valWeight">--</div>
            </div>
            <div class="bg-gray-900 border border-gray-800 p-6 rounded-[32px]">
                <div class="text-[9px] font-black text-gray-600 uppercase tracking-widest mb-1">Altura</div>
                <div class="text-2xl font-black italic text-white" id="valHeight">--</div>
            </div>
        </div>
    </div>
    
    <footer class="mt-12 text-center">
        <p class="text-[8px] font-black text-gray-700 uppercase tracking-[0.4em]">SDR • Shape de Responsa v2.0</p>
    </footer>
</main>

<script>
let DB = { user: null };
let currentUser = null;
let isRegisterMode = false;

async function init() {
    const { auth, onAuthStateChanged } = window.fb;

    // Listener global para mudanças de autenticação
    onAuthStateChanged(auth, async (user) => {
        if (user) {
            console.log("Usuário detectado:", user.uid);
            currentUser = user;
            document.getElementById('auth-screen').classList.add('hidden');
            await checkUserProfile();
        } else {
            currentUser = null;
            document.getElementById('auth-screen').classList.remove('hidden');
            document.getElementById('app-content').classList.add('hidden');
            document.getElementById('onboarding').classList.add('hidden');
        }
    });
}

// Alternar entre Login e Cadastro
function toggleAuthMode() {
    isRegisterMode = !isRegisterMode;
    const btnAction = document.getElementById('btn-main-action');
    const btnSwitch = document.getElementById('btn-switch-auth');
    
    if(isRegisterMode) {
        btnAction.innerText = "Criar Conta";
        btnSwitch.innerText = "Já tem conta? Entrar";
    } else {
        btnAction.innerText = "Entrar";
        btnSwitch.innerText = "Não tem conta? Criar agora";
    }
}

// Login/Cadastro E-mail
async function handleEmailAuth() {
    const { auth, signInWithEmailAndPassword, createUserWithEmailAndPassword } = window.fb;
    const email = document.getElementById('auth-email').value;
    const pass = document.getElementById('auth-pass').value;

    if(!email || !pass) return showToast("Preencha todos os campos");
    if(pass.length < 6) return showToast("Senha deve ter no mínimo 6 dígitos");

    try {
        if(isRegisterMode) {
            await createUserWithEmailAndPassword(auth, email, pass);
            showToast("Conta criada com sucesso!");
        } else {
            await signInWithEmailAndPassword(auth, email, pass);
        }
    } catch (e) {
        console.error("Erro E-mail Auth:", e);
        if(e.code === 'auth/user-not-found' || e.code === 'auth/wrong-password' || e.code === 'auth/invalid-credential') showToast("E-mail ou senha inválidos");
        else if(e.code === 'auth/email-already-in-use') showToast("E-mail já cadastrado");
        else showToast("Falha na autenticação");
    }
}

// Google Login
async function loginGoogle() {
    const { auth, GoogleAuthProvider, signInWithPopup } = window.fb;
    const provider = new GoogleAuthProvider();
    provider.setCustomParameters({ prompt: 'select_account' });
    
    try {
        const result = await signInWithPopup(auth, provider);
        console.log("Sucesso Google:", result.user.email);
        // O onAuthStateChanged cuidará do resto, mas chamamos explicitamente por garantia
        currentUser = result.user;
        await checkUserProfile();
    } catch (e) { 
        console.error("Erro Google Login:", e);
        if(e.code === 'auth/popup-closed-by-user') showToast("Login cancelado");
        else showToast("ERRO GOOGLE: " + e.code);
    }
}

// Perfil e Firestore
async function checkUserProfile() {
    if (!currentUser) return;
    
    const { db, appId, doc, getDoc } = window.fb;
    try {
        const userRef = doc(db, 'artifacts', appId, 'users', currentUser.uid, 'profile', 'data');
        const snap = await getDoc(userRef);

        if (snap.exists()) {
            DB = snap.data();
            showMainApp();
        } else {
            // Se for login do Google e não tiver perfil, preenche o nome automaticamente
            if (currentUser.displayName) {
                document.getElementById('ob-name').value = currentUser.displayName;
            }
            document.getElementById('auth-screen').classList.add('hidden');
            document.getElementById('onboarding').classList.remove('hidden');
        }
    } catch (err) {
        console.error("Erro ao ler perfil:", err);
        showToast("Erro ao carregar dados do usuário");
    }
}

async function finishOnboarding() {
    const n = document.getElementById('ob-name').value;
    const h = document.getElementById('ob-height').value;
    const w = document.getElementById('ob-weight').value;
    if(!n || !h || !w) return showToast("DADOS INCOMPLETOS");

    DB.user = { 
        name: n, 
        email: currentUser.email || "Sem e-mail",
        height: h, 
        weight: w 
    };

    const { db, appId, doc, setDoc } = window.fb;
    try {
        await setDoc(doc(db, 'artifacts', appId, 'users', currentUser.uid, 'profile', 'data'), DB);
        document.getElementById('onboarding').classList.add('hidden');
        showMainApp();
    } catch (err) {
        console.error("Erro ao salvar perfil:", err);
        showToast("Erro ao salvar dados");
    }
}

function showMainApp() {
    if (!DB || !DB.user) return;
    document.getElementById('auth-screen').classList.add('hidden');
    document.getElementById('app-content').classList.remove('hidden');
    document.getElementById('userName').innerText = DB.user.name;
    document.getElementById('valWeight').innerText = `${DB.user.weight}kg`;
    document.getElementById('valHeight').innerText = `${DB.user.height}cm`;
}

function logout() {
    window.fb.signOut(window.fb.auth);
}

function showToast(m) {
    const t = document.getElementById('toast');
    t.innerText = m;
    t.classList.remove('hidden');
    setTimeout(() => t.classList.add('hidden'), 4000);
}

window.onload = init;
</script>
</body>
</html>
