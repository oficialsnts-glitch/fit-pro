<!DOCTYPE html>
<html lang="pt-PT">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#ef4444">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>SDR - SHAPE DE RESPONSA</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
  import { 
    getAuth, onAuthStateChanged, GoogleAuthProvider, signInWithPopup, 
    signInWithEmailAndPassword, createUserWithEmailAndPassword, signOut 
  } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
  import { getFirestore, doc, setDoc, getDoc, collection, onSnapshot } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyB-OVW28besAOq2gi9b6Et9EqIajLS-uwY",
    authDomain: "fit-pro-985ac.firebaseapp.com",
    projectId: "fit-pro-985ac",
    storageBucket: "fit-pro-985ac.firebasestorage.app",
    messagingSenderId: "809428255492",
    appId: "1:809428255492:web:c59ee6687310b8a3004651"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getFirestore(app);
  const appId = "fit-pro-985ac";

  // Exportar para o escopo global de forma segura
  window.fb = { 
    auth, db, appId, doc, setDoc, getDoc, collection, onSnapshot,
    GoogleAuthProvider, signInWithPopup, signInWithEmailAndPassword, createUserWithEmailAndPassword, signOut 
  };

  // Inicializar o observador assim que o Firebase carregar
  onAuthStateChanged(auth, async (user) => {
      const authScreen = document.getElementById('auth-screen');
      const mainApp = document.getElementById('main-app');
      
      if (user) {
          window.currentUser = user;
          if(authScreen) authScreen.classList.add('hidden');
          if(mainApp) mainApp.classList.remove('hidden');
          await window.loadUserData(); 
      } else {
          window.currentUser = null;
          if(authScreen) authScreen.classList.remove('hidden');
          if(mainApp) mainApp.classList.add('hidden');
      }
  });
</script>

<style>
  body { -webkit-tap-highlight-color: transparent; overscroll-behavior: none; background-color: #111827; }
  .muscle { fill: #374151; transition: all 0.3s; }
  .muscle-active { fill: #ef4444; filter: drop-shadow(0 0 6px #ef4444); }
  .gif-img { object-fit: cover; width: 100%; height: 100%; }
  .timer-ring { transform: rotate(-90deg); transform-origin: 50% 50%; }
  @keyframes slideUp { from { transform: translateY(100%); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
  .slide-up { animation: slideUp 0.4s cubic-bezier(0.16, 1, 0.3, 1); }
  .btn-press:active { transform: scale(0.96); }
  .tab-btn.active { color: #ef4444; font-weight: 800; }
  .brand-gradient { background: linear-gradient(135deg, #ef4444 0%, #991b1b 100%); }
  ::-webkit-scrollbar { width: 0px; background: transparent; }
</style>
</head>
<body class="bg-gray-900 text-white font-sans select-none overflow-x-hidden">

<div id="toast" class="hidden fixed top-6 left-1/2 -translate-x-1/2 bg-red-600 text-white px-6 py-3 rounded-2xl z-[20000] shadow-2xl slide-up text-sm font-bold uppercase"></div>

<div id="auth-screen" class="fixed inset-0 bg-gray-950 flex items-center justify-center p-6 z-[10000] overflow-y-auto">
    <div class="w-full max-w-sm text-center slide-up py-10">
        <div class="mb-10">
            <div class="w-20 h-20 brand-gradient rounded-[30px] mx-auto flex items-center justify-center text-4xl mb-4 shadow-2xl shadow-red-900/40 border border-red-500/30">💀</div>
            <h1 class="text-3xl font-black italic uppercase tracking-tighter leading-none text-white">SDR<br><span class="text-red-500">SHAPE DE RESPONSA</span></h1>
        </div>

        <div id="auth-forms" class="space-y-4">
            <button onclick="loginGoogle()" class="w-full bg-white text-black py-4 rounded-2xl font-bold flex items-center justify-center gap-3 btn-press shadow-lg mb-4">
                <svg class="w-5 h-5" viewBox="0 0 488 512"><path d="M488 261.8C488 403.3 391.1 504 248 504 110.8 504 0 393.2 0 256S110.8 8 248 8c66.8 0 123 24.5 166.3 64.9l-67.5 64.9C258.5 52.6 94.3 116.6 94.3 256c0 86.5 69.1 156.6 153.7 156.6 98.2 0 135-70.4 140.8-106.9H248v-85.3h236.1c2.3 12.7 3.9 24.9 3.9 41.4z"/></svg>
                Entrar com Google
            </button>

            <div class="flex items-center gap-4 py-2 opacity-30">
                <div class="h-[1px] bg-gray-600 flex-1"></div>
                <span class="text-[9px] font-black uppercase">OU E-MAIL</span>
                <div class="h-[1px] bg-gray-600 flex-1"></div>
            </div>

            <div class="space-y-3 text-left">
                <input id="auth-email" type="email" placeholder="E-mail" class="w-full bg-gray-900 border border-gray-800 p-4 rounded-2xl text-sm outline-none focus:border-red-500 transition-all">
                <input id="auth-pass" type="password" placeholder="Senha" class="w-full bg-gray-900 border border-gray-800 p-4 rounded-2xl text-sm outline-none focus:border-red-500 transition-all">
                <button id="btn-main-action" onclick="handleEmailAuth()" class="w-full bg-red-600 py-4 rounded-2xl font-black uppercase tracking-widest text-sm btn-press shadow-lg shadow-red-900/20 mt-2">Entrar</button>
                <button id="btn-switch-auth" onclick="toggleAuthMode()" class="w-full mt-2 text-[10px] text-gray-500 font-bold uppercase tracking-widest text-center">Criar conta nova</button>
            </div>
        </div>
    </div>
</div>

<div id="main-app" class="hidden pb-24">
    <nav class="fixed bottom-0 w-full bg-gray-900/95 backdrop-blur border-t border-gray-800 flex justify-around z-50 py-2">
        <button onclick="showTab('home')" class="p-3 flex-1 text-center tab-btn btn-press active" id="btn-home">
            <div class="text-xl">🏠</div><div class="text-[10px] font-bold uppercase">Início</div>
        </button>
        <button onclick="showTab('exercises')" class="p-3 flex-1 text-center tab-btn btn-press" id="btn-exercises">
            <div class="text-xl">💪</div><div class="text-[10px] font-bold uppercase">Exercícios</div>
        </button>
        <button onclick="showTab('workout')" class="p-3 flex-1 text-center tab-btn btn-press" id="btn-workout">
            <div class="text-xl">🔥</div><div class="text-[10px] font-bold uppercase">Treinar</div>
        </button>
        <button onclick="showTab('progress')" class="p-3 flex-1 text-center tab-btn btn-press" id="btn-progress">
            <div class="text-xl">📊</div><div class="text-[10px] font-bold uppercase">Evolução</div>
        </button>
        <button onclick="showTab('profile')" class="p-3 flex-1 text-center tab-btn btn-press" id="btn-profile">
            <div class="text-xl">👤</div><div class="text-[10px] font-bold uppercase">Perfil</div>
        </button>
    </nav>

    <section id="home" class="tab-content p-6">
        <div class="flex justify-between items-center mb-6">
            <div>
                <h1 class="text-2xl font-black italic uppercase leading-none">Olá, <span id="userNameHome" class="text-red-500">...</span></h1>
                <p id="biotipoHome" class="text-[10px] text-gray-500 font-bold uppercase tracking-widest mt-1">Carregando...</p>
            </div>
            <button onclick="logout()" class="p-2 bg-gray-800 rounded-xl text-lg">🚪</button>
        </div>
        <div class="brand-gradient p-6 rounded-[32px] mb-6 shadow-2xl shadow-red-900/20">
            <div class="text-xs font-bold uppercase opacity-80 mb-1">Próximo Desafio</div>
            <div class="text-2xl font-black italic uppercase mb-4" id="todayWorkoutName">Gere o seu Treino</div>
            <button onclick="showTab('workout')" class="bg-white text-black px-6 py-2.5 rounded-xl font-black text-xs uppercase tracking-widest btn-press">Iniciar Protocolo</button>
        </div>
        <div class="grid grid-cols-3 gap-3 mb-6">
            <div class="bg-gray-800/50 border border-gray-800 p-4 rounded-3xl text-center">
                <div class="text-[9px] font-black text-gray-500 uppercase mb-1">Peso</div>
                <div class="text-lg font-black italic" id="currentWeight">-- kg</div>
            </div>
            <div class="bg-gray-800/50 border border-gray-800 p-4 rounded-3xl text-center">
                <div class="text-[9px] font-black text-gray-500 uppercase mb-1">Treinos</div>
                <div class="text-lg font-black italic" id="workoutCount">0</div>
            </div>
            <div class="bg-gray-800/50 border border-gray-800 p-4 rounded-3xl text-center">
                <div class="text-[9px] font-black text-gray-500 uppercase mb-1">TMB</div>
                <div class="text-lg font-black italic" id="tmbValue">--</div>
            </div>
        </div>
    </section>

    <section id="exercises" class="tab-content hidden p-6">
        <h1 class="text-2xl font-black italic uppercase mb-6">BIBLIOTECA <span class="text-red-500">SDR</span></h1>
        <div id="exerciseList" class="space-y-3"></div>
    </section>
    
    <section id="workout" class="tab-content hidden p-6">
        <div id="workoutSetup">
            <h1 class="text-2xl font-black italic uppercase mb-6">ESCOLHER <span class="text-red-500">PLANO</span></h1>
            <button onclick="generateWorkout('ABC')" class="w-full bg-gray-800 p-6 rounded-[32px] text-left font-black uppercase italic">ABC 2x Hipertrofia</button>
        </div>
        <div id="workoutActive" class="hidden">
             <div class="bg-red-600 p-4 rounded-xl text-center font-mono font-bold" id="timer">00:00</div>
             <div id="exerciseContainer" class="mt-4 space-y-4"></div>
             <button onclick="finishWorkout()" class="w-full bg-green-600 py-5 rounded-[32px] font-black uppercase mt-4">Finalizar</button>
        </div>
    </section>

    <section id="progress" class="tab-content hidden p-6">
        <h1 class="text-2xl font-black italic uppercase mb-6 text-red-500">EVOLUÇÃO</h1>
        <canvas id="weightChart"></canvas>
    </section>

    <section id="profile" class="tab-content hidden p-6">
        <h1 class="text-2xl font-black italic uppercase mb-6">DADOS DO <span class="text-red-500">ATLETA</span></h1>
        <div class="space-y-4 bg-gray-800/50 p-6 rounded-[40px]">
            <input id="name" placeholder="Nome" class="w-full bg-gray-950 p-4 rounded-2xl border border-gray-800 outline-none">
            <input id="height" type="number" placeholder="Altura" class="w-full bg-gray-950 p-4 rounded-2xl border border-gray-800 outline-none">
            <input id="weight" type="number" placeholder="Peso" class="w-full bg-gray-950 p-4 rounded-2xl border border-gray-800 outline-none">
            <input id="age" type="number" placeholder="Idade" class="w-full bg-gray-950 p-4 rounded-2xl border border-gray-800 outline-none">
            <select id="gender" class="w-full bg-gray-950 p-4 rounded-2xl border border-gray-800 outline-none"><option value="M">M</option><option value="F">F</option></select>
            <select id="objective" class="w-full bg-gray-950 p-4 rounded-2xl border border-gray-800 outline-none"><option value="Hipertrofia">Hipertrofia</option></select>
            <button onclick="saveProfile()" class="w-full bg-red-600 py-5 rounded-[32px] font-black uppercase">Salvar</button>
        </div>
    </section>
</div>

<script>
let DB = {
    user: { name: '', height: 170, weight: 75, age: 25, gender: 'M', objective: 'Hipertrofia' },
    logs: [], progress: [], workoutCount: 0
};
let isRegisterMode = false;
let workoutTimer = null;
let secondsActive = 0;

const EXERCISES = [
  {id:1,name:'Supino Reto Barra',category:'Peito',gif:''},
  {id:2,name:'Agachamento Livre',category:'Pernas',gif:''}
];

// --- AUTH FUNCTIONS ---
async function loginGoogle() {
    try {
        const provider = new window.fb.GoogleAuthProvider();
        await window.fb.signInWithPopup(window.fb.auth, provider);
        // O onAuthStateChanged tratará o "redirecionamento" visual
    } catch(e) {
        console.error(e);
        showToast("ERRO NO LOGIN GOOGLE");
    }
}

async function handleEmailAuth() {
    const email = document.getElementById('auth-email').value;
    const pass = document.getElementById('auth-pass').value;
    if(!email || !pass) return showToast("PREENCHA TUDO");
    try {
        if(isRegisterMode) await window.fb.createUserWithEmailAndPassword(window.fb.auth, email, pass);
        else await window.fb.signInWithEmailAndPassword(window.fb.auth, email, pass);
    } catch(e) { showToast("ERRO: " + e.code); }
}

function toggleAuthMode() {
    isRegisterMode = !isRegisterMode;
    document.getElementById('btn-main-action').innerText = isRegisterMode ? "CRIAR CONTA" : "ENTRAR";
}

async function logout() { await window.fb.signOut(window.fb.auth); }

// --- DATA FUNCTIONS ---
window.loadUserData = async function() {
    if(!window.currentUser) return;
    const { db, appId, doc, getDoc } = window.fb;
    const docRef = doc(db, 'artifacts', appId, 'users', window.currentUser.uid, 'appData', 'main');
    
    try {
        const snap = await getDoc(docRef);
        if(snap.exists()) {
            DB = snap.data();
        } else {
            DB.user.name = window.currentUser.displayName ? window.currentUser.displayName.split(' ')[0] : 'Atleta';
            await saveToFirebase();
        }
        updateUI();
        renderExercises();
    } catch (e) {
        console.error(e);
        showToast("ERRO AO CARREGAR DADOS");
    }
};

async function saveToFirebase() {
    if(!window.currentUser) return;
    const { db, appId, doc, setDoc } = window.fb;
    await setDoc(doc(db, 'artifacts', appId, 'users', window.currentUser.uid, 'appData', 'main'), DB);
}

// --- UI FUNCTIONS ---
function showTab(tab) {
    document.querySelectorAll('.tab-content').forEach(t => t.classList.add('hidden'));
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.getElementById(tab).classList.remove('hidden');
    document.getElementById('btn-'+tab).classList.add('active');
}

function updateUI() {
    document.getElementById('userNameHome').innerText = DB.user.name;
    document.getElementById('biotipoHome').innerText = DB.user.objective;
    document.getElementById('currentWeight').innerText = DB.user.weight + ' kg';
    document.getElementById('workoutCount').innerText = DB.workoutCount;
    
    // Inputs
    document.getElementById('name').value = DB.user.name;
    document.getElementById('height').value = DB.user.height;
    document.getElementById('weight').value = DB.user.weight;
}

function renderExercises() {
    const list = document.getElementById('exerciseList');
    list.innerHTML = EXERCISES.map(ex => `
        <div class="bg-gray-800 p-4 rounded-2xl font-bold uppercase italic border border-gray-700">${ex.name}</div>
    `).join('');
}

async function saveProfile() {
    DB.user = {
        name: document.getElementById('name').value,
        height: parseInt(document.getElementById('height').value),
        weight: parseFloat(document.getElementById('weight').value),
        age: parseInt(document.getElementById('age').value),
        gender: document.getElementById('gender').value,
        objective: document.getElementById('objective').value
    };
    await saveToFirebase();
    updateUI();
    showToast("PERFIL SALVO");
}

function generateWorkout(type) {
    document.getElementById('workoutSetup').classList.add('hidden');
    document.getElementById('workoutActive').classList.remove('hidden');
    startTimer();
}

function startTimer() {
    secondsActive = 0;
    workoutTimer = setInterval(() => {
        secondsActive++;
        const m = Math.floor(secondsActive/60).toString().padStart(2, '0');
        const s = (secondsActive%60).toString().padStart(2, '0');
        document.getElementById('timer').innerText = `${m}:${s}`;
    }, 1000);
}

function finishWorkout() {
    clearInterval(workoutTimer);
    DB.workoutCount++;
    saveToFirebase();
    showToast("TREINO CONCLUÍDO");
    setTimeout(() => location.reload(), 1000);
}

function showToast(m) {
    const t = document.getElementById('toast');
    t.innerText = m; t.classList.remove('hidden');
    setTimeout(() => t.classList.add('hidden'), 3000);
}
</script>
</body>
</html>
